<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Tron Lightcycles - 8 Hráčů, Schopnosti & Inventář</title>
    <style>
        body {
            background-color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: #0ff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }
        canvas {
            border: 2px solid #0ff;
            box-shadow: 0 0 20px #0ff;
            background-color: #050505;
            display: none;
        }
        h1 { text-shadow: 0 0 10px #0ff; margin-bottom: 5px; text-align: center; }
        
        #menu {
            background: #111;
            border: 2px solid #0ff;
            box-shadow: 0 0 20px #0ff;
            padding: 20px 30px;
            border-radius: 10px;
            text-align: center;
            max-width: 95vw;
            max-height: 90vh;
            overflow-y: auto;
        }
        .setup-row { margin: 15px 0; display: flex; justify-content: center; gap: 20px; align-items: center; }
        select, button {
            background: #000; color: #0ff; border: 1px solid #0ff;
            padding: 5px 10px; font-family: inherit; cursor: pointer;
        }
        button:hover { background: #0ff; color: #000; }
        
        #previewContainer {
            width: 300px; height: 180px;
            border: 1px dashed #444;
            margin: 10px auto;
            display: flex; align-items: center; justify-content: center;
            background: #050505;
        }
        #mapPreview {
            border: 2px solid #0ff;
            background: #111;
            transition: width 0.3s, height 0.3s;
        }

        #controlsSetup {
            display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 15px;
        }
        .player-card {
            border: 1px solid currentColor; padding: 10px; border-radius: 5px;
            display: flex; flex-direction: column; gap: 4px; width: 140px;
            transition: color 0.3s;
            font-size: 0.85em;
        }
        .player-card h3, .player-card h4 { margin: 0; text-align: center; font-size: 1.1em; }
        .player-card button { border-color: currentColor; color: currentColor; font-size: 0.8em; padding: 3px; }
        .player-card button:hover { background: currentColor; color: #000; }
        .player-card button.action-btn { border-width: 2px; font-weight: bold; margin-top: 5px; }
        
        .color-picker-row {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.85em; margin-bottom: 5px;
        }
        .color-picker-row input[type="color"] {
            background: none; border: none; cursor: pointer;
            padding: 0; width: 25px; height: 25px; border-radius: 5px;
        }
        
        #startBtn { font-size: 1.5em; padding: 10px 30px; margin-top: 10px; font-weight: bold; }
        
        .hud { display: none; flex-direction: column; align-items: center; margin-bottom: 5px; }
        .legend { margin-top: 10px; color: #fff; font-size: 0.75em; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; max-width: 800px; }
        .legend span { display: flex; align-items: center; gap: 5px; }
        .box { width: 12px; height: 12px; display: inline-block; box-shadow: 0 0 5px currentColor; }
        #ingameUI { display: flex; gap: 20px; margin-bottom: 5px; font-size: 0.9em; height: 20px; }
        .inv-slot { display: inline-block; width: 15px; height: 15px; border: 1px solid #fff; vertical-align: middle; margin-left: 5px; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>TRON LIGHTCYCLES</h1>
        
        <div class="setup-row">
            <label>Počet hráčů: 
                <select id="pCount" onchange="generateControlUI()">
                    <option value="2">2 Hráči</option>
                    <option value="3">3 Hráči</option>
                    <option value="4" selected>4 Hráči</option>
                    <option value="5">5 Hráčů</option>
                    <option value="6">6 Hráčů</option>
                    <option value="7">7 Hráčů</option>
                    <option value="8">8 Hráčů</option>
                </select>
            </label>
            <label>Velikost mapy: 
                <select id="mapSize" onchange="updateMapPreview()">
                    <option value="600,400">Malá (600x400)</option>
                    <option value="1000,600" selected>Střední (1000x600)</option>
                    <option value="1400,800">Velká (1400x800)</option>
                    <option value="1800,900">Obří (1800x900)</option>
                </select>
            </label>
        </div>

        <div id="previewContainer">
            <div id="mapPreview"></div>
        </div>
        
        <div id="controlsSetup"></div>
        <button id="startBtn" onclick="startGame()">START HRY</button>
        <p id="bindMsg" style="color: #ff0; min-height: 20px; margin-top: 5px;"></p>
    </div>

    <div id="gameContainer" class="hud">
        <div id="ingameUI"></div>
        <canvas id="game"></canvas>
        <div class="legend">
            <span style="color: #0f0"><div class="box" style="background: #0f0"></div> Zrychlení</span>
            <span style="color: #ff0"><div class="box" style="background: #ff0"></div> Zpomalení</span>
            <span style="color: #f0f"><div class="box" style="background: #f0f"></div> Obrácení</span>
            <span style="color: #fff"><div class="box" style="background: #fff"></div> Duch</span>
            <span style="color: #666"><div class="box" style="background: #666"></div> Tma</span>
            <span style="color: #0aa"><div class="box" style="background: #0aa"></div> Skok na ocas</span>
            <span style="color: #f80"><div class="box" style="background: #f80"></div> Střela-Mazač</span>
            <span style="color: #a0a"><div class="box" style="background: #a0a"></div> Štít-Výměna</span>
        </div>
    </div>

<script src="../censor.js"></script>
<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const gridSize = 5;

    let gameActive = false;
    let globalBlackout = false;
    let boosterInterval;
    let animationId;

    let allTrails = [];
    let grid = new Map();
    let players = [];
    let boosters = [];
    let projectiles = [];
    let scores = [0, 0, 0, 0, 0, 0, 0, 0];

    const BOOSTER_SIZE = 15;
    const HITBOX_MARGIN = 10;
    const BOOSTER_TYPES = ['speed', 'slow', 'reverse', 'ghost', 'blackout', 'tail', 'shoot', 'swap'];
    const BOOSTER_COLORS = {
        'speed': '#0f0', 'slow': '#ff0', 'reverse': '#f0f', 'ghost': '#fff', 
        'blackout': '#666', 'tail': '#0aa', 'shoot': '#f80', 'swap': '#a0a'
    };

    const defaultConfigs = [
        { id: 1, color: '#0000ff', keys: { up: 'w', down: 's', left: 'a', right: 'd', action: 'q' } },
        { id: 2, color: '#ff0000', keys: { up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight', action: 'Enter' } },
        { id: 3, color: '#00ff00', keys: { up: 'i', down: 'k', left: 'j', right: 'l', action: 'u' } },
        { id: 4, color: '#ffff00', keys: { up: 'Numpad8', down: 'Numpad5', left: 'Numpad4', right: 'Numpad6', action: 'Numpad7' } },
        { id: 5, color: '#00ffff', keys: { up: 't', down: 'g', left: 'f', right: 'h', action: 'r' } },
        { id: 6, color: '#ff00ff', keys: { up: 'Home', down: 'End', left: 'Delete', right: 'PageDown', action: 'Insert' } },
        { id: 7, color: '#ffffff', keys: { up: '8', down: '5', left: '4', right: '6', action: '7' } },
        { id: 8, color: '#ff8800', keys: { up: 'y', down: 'b', left: 'v', right: 'n', action: 'c' } }
    ];

    let playerConfigs = JSON.parse(JSON.stringify(defaultConfigs));
    let bindingKey = null;

    function updateMapPreview() {
        const size = document.getElementById('mapSize').value.split(',');
        const w = parseInt(size[0]);
        const h = parseInt(size[1]);
        const preview = document.getElementById('mapPreview');
        const scale = Math.min(280 / w, 160 / h);
        preview.style.width = (w * scale) + 'px';
        preview.style.height = (h * scale) + 'px';
    }

    function generateControlUI() {
        const count = parseInt(document.getElementById('pCount').value);
        const container = document.getElementById('controlsSetup');
        container.innerHTML = '';
        
        for (let i = 0; i < count; i++) {
            const conf = playerConfigs[i];
            const div = document.createElement('div');
            div.className = 'player-card';
            div.style.color = conf.color;
            div.innerHTML = `
                <h3>Hráč ${i + 1}</h3>
                <h4>Výhry: ${scores[i]}</h4>
                <label class="color-picker-row">
                    Barva: 
                    <input type="color" value="${conf.color}" onchange="updatePlayerColor(${i}, this.value)">
                </label>
                <button onclick="startBinding(${i}, 'up')">Nahoru: ${formatKey(conf.keys.up)}</button>
                <button onclick="startBinding(${i}, 'down')">Dolů: ${formatKey(conf.keys.down)}</button>
                <button onclick="startBinding(${i}, 'left')">Vlevo: ${formatKey(conf.keys.left)}</button>
                <button onclick="startBinding(${i}, 'right')">Vpravo: ${formatKey(conf.keys.right)}</button>
                <button class="action-btn" onclick="startBinding(${i}, 'action')">AKCE: ${formatKey(conf.keys.action)}</button>
            `;
            container.appendChild(div);
        }
    }

    function formatKey(key) {
        if(key === ' ') return 'Space';
        return key.replace('Arrow', '').replace('Numpad', 'Num');
    }

    function updatePlayerColor(playerIdx, newColor) {
        playerConfigs[playerIdx].color = newColor;
        generateControlUI();
    }

    function startBinding(playerIdx, action) {
        bindingKey = { playerIdx, action };
        document.getElementById('bindMsg').innerText = `Stiskněte klávesu pro: Hráč ${playerIdx + 1} - ${action.toUpperCase()}`;
    }

    window.addEventListener('keydown', e => {
        if (bindingKey) {
            e.preventDefault();
            playerConfigs[bindingKey.playerIdx].keys[bindingKey.action] = e.code.startsWith('Numpad') ? e.code : e.key;
            bindingKey = null;
            document.getElementById('bindMsg').innerText = "";
            generateControlUI();
            return;
        }

        if (gameActive) {
            let keyMatched = false;
            players.forEach(p => {
                if (!p.active) return;
                
                let kUp = p.keys.up, kDown = p.keys.down, kLeft = p.keys.left, kRight = p.keys.right;
                if (p.reversed) { kUp = p.keys.down; kDown = p.keys.up; kLeft = p.keys.right; kRight = p.keys.left; }

                let pressed = e.code.startsWith('Numpad') ? e.code : e.key;

                if (pressed === p.keys.action) {
                    useInventory(p);
                    keyMatched = true;
                } else if (pressed === kUp && p.dy === 0) { p.dx = 0; p.dy = -gridSize; keyMatched = true; }
                else if (pressed === kDown && p.dy === 0) { p.dx = 0; p.dy = gridSize; keyMatched = true; }
                else if (pressed === kLeft && p.dx === 0) { p.dx = -gridSize; p.dy = 0; keyMatched = true; }
                else if (pressed === kRight && p.dx === 0) { p.dx = gridSize; p.dy = 0; keyMatched = true; }
            });
            if(keyMatched && !e.ctrlKey && !e.altKey && !e.metaKey) e.preventDefault();
        }
    });

    function getStartPos(index, w, h) {
        const p = [
            { x: 0.1, y: 0.1, dx: gridSize, dy: 0 }, { x: 0.9, y: 0.9, dx: -gridSize, dy: 0 },
            { x: 0.1, y: 0.9, dx: gridSize, dy: 0 }, { x: 0.9, y: 0.1, dx: -gridSize, dy: 0 },
            { x: 0.5, y: 0.1, dx: 0, dy: gridSize }, { x: 0.5, y: 0.9, dx: 0, dy: -gridSize },
            { x: 0.1, y: 0.5, dx: gridSize, dy: 0 }, { x: 0.9, y: 0.5, dx: -gridSize, dy: 0 }
        ];
        return { x: w * p[index].x, y: h * p[index].y, dx: p[index].dx, dy: p[index].dy };
    }

    function startGame() {
        const size = document.getElementById('mapSize').value.split(',');
        canvas.width = parseInt(size[0]);
        canvas.height = parseInt(size[1]);

        document.getElementById('menu').style.display = 'none';
        document.getElementById('gameContainer').style.display = 'flex';
        canvas.style.display = 'block';

        const count = parseInt(document.getElementById('pCount').value);
        players = [];
        grid.clear();
        allTrails = [];
        boosters = [];
        projectiles = [];
        globalBlackout = false;
        
        for (let i = 0; i < count; i++) {
            let conf = playerConfigs[i];
            let start = getStartPos(i, canvas.width, canvas.height);
            start.x = Math.floor(start.x / gridSize) * gridSize;
            start.y = Math.floor(start.y / gridSize) * gridSize;

            players.push({
                id: conf.id, active: true,
                x: start.x, y: start.y, dx: start.dx, dy: start.dy,
                baseColor: conf.color, color: conf.color, keys: conf.keys,
                moveDelay: 2, moveTimer: 0, reversed: false, ghost: false, 
                trail: [], inventory: null, swapShield: false
            });
        }

        updateIngameUI();

        ctx.fillStyle = '#050505';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        gameActive = true;
        if(boosterInterval) clearInterval(boosterInterval);
        boosterInterval = setInterval(spawnBooster, 3500);
        
        draw();
    }

    function updateIngameUI() {
        const ui = document.getElementById('ingameUI');
        ui.innerHTML = '';
        players.forEach(p => {
            let invColor = p.inventory ? BOOSTER_COLORS[p.inventory] : 'transparent';
            let shield = p.swapShield ? '🛡️' : '';
            ui.innerHTML += `<div style="color:${p.baseColor}">P${p.id}: <div class="inv-slot" style="background:${invColor}"></div> ${shield}</div>`;
        });
    }

    function spawnBooster() {
        if (!gameActive) return;
        const x = Math.floor(Math.random() * (canvas.width - BOOSTER_SIZE) / gridSize) * gridSize;
        const y = Math.floor(Math.random() * (canvas.height - BOOSTER_SIZE) / gridSize) * gridSize;
        const type = BOOSTER_TYPES[Math.floor(Math.random() * BOOSTER_TYPES.length)];
        boosters.push({x, y, type, color: BOOSTER_COLORS[type], size: BOOSTER_SIZE});
    }

    function useInventory(p) {
        if (!p.inventory) return;
        const type = p.inventory;
        p.inventory = null;
        updateIngameUI();

        if (type === 'speed') { p.moveDelay = 1; setTimeout(() => { if(p.active) p.moveDelay = 2; }, 4000); }
        else if (type === 'slow') { p.moveDelay = 4; setTimeout(() => { if(p.active) p.moveDelay = 2; }, 4000); }
        else if (type === 'reverse') { p.reversed = true; setTimeout(() => { if(p.active) p.reversed = false; }, 4000); }
        else if (type === 'ghost') { 
            p.ghost = true; p.color = '#fff'; 
            setTimeout(() => { if(p.active) { p.ghost = false; p.color = p.baseColor; grid.set(`${p.x},${p.y}`, p.id); } }, 3000);
        }
        else if (type === 'blackout') { globalBlackout = true; setTimeout(() => { globalBlackout = false; redrawAll(); }, 3000); }
        else if (type === 'tail') {
            if (p.trail.length > 0) {
                let tail = p.trail[0];
                p.x = tail.x; p.y = tail.y;
                p.trail = [];
                redrawAll();
            }
        }
        else if (type === 'shoot') {
            projectiles.push({ x: p.x, y: p.y, dx: p.dx * 3, dy: p.dy * 3, life: 50, color: p.color });
        }
        else if (type === 'swap') {
            p.swapShield = true;
            updateIngameUI();
        }
    }

    function draw() {
        if (!gameActive) return;

        if (globalBlackout) {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        updateProjectiles();
        players.forEach(p => updatePlayer(p));

        if (!globalBlackout) {
            boosters.forEach(b => {
                ctx.fillStyle = b.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = b.color;
                ctx.fillRect(b.x, b.y, b.size, b.size);
            });
        }

        animationId = setTimeout(() => requestAnimationFrame(draw), 15);
    }

    function updateProjectiles() {
        let needsRedraw = false;
        for (let i = projectiles.length - 1; i >= 0; i--) {
            let pr = projectiles[i];
            pr.x += pr.dx;
            pr.y += pr.dy;
            pr.life--;
            
            let cx = Math.floor(pr.x / gridSize) * gridSize;
            let cy = Math.floor(pr.y / gridSize) * gridSize;
            
            for(let sx = -1; sx <= 1; sx++) {
                for(let sy = -1; sy <= 1; sy++) {
                    let kx = cx + sx*gridSize, ky = cy + sy*gridSize;
                    if(grid.has(`${kx},${ky}`)) {
                        grid.delete(`${kx},${ky}`);
                        needsRedraw = true;
                    }
                }
            }
            
            if (!globalBlackout) {
                ctx.fillStyle = pr.color;
                ctx.shadowBlur = 5;
                ctx.shadowColor = pr.color;
                ctx.fillRect(pr.x, pr.y, gridSize*2, gridSize*2);
            }

            if (pr.life <= 0 || pr.x < 0 || pr.x > canvas.width || pr.y < 0 || pr.y > canvas.height) {
                projectiles.splice(i, 1);
                needsRedraw = true;
            }
        }
        
        if(needsRedraw) {
            allTrails = [];
            players.forEach(pl => {
                pl.trail = pl.trail.filter(t => grid.has(`${t.x},${t.y}`));
                allTrails.push(...pl.trail.map(t => ({x: t.x, y: t.y, color: pl.baseColor})));
            });
            redrawAll();
        }
    }

    function redrawAll() {
        ctx.fillStyle = '#050505';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        allTrails.forEach(t => {
            ctx.fillStyle = t.color;
            ctx.shadowBlur = 0;
            ctx.fillRect(t.x, t.y, gridSize, gridSize);
        });
        players.forEach(p => { if(p.active && !p.ghost) render(p); });
    }

    function updatePlayer(p) {
        if (!p.active) return;
        
        p.moveTimer++;
        if (p.moveTimer >= p.moveDelay) {
            p.moveTimer = 0;
            move(p);
            
            let hitRes = checkCollision(p);
            if (hitRes === 'wall' || hitRes === 'dead') {
                p.active = false;
                checkGameOver();
                return;
            }
            
            checkBooster(p);
            if (!globalBlackout && p.active) render(p);
        }
    }

    function move(p) {
        if (!p.ghost) {
            p.trail.push({x: p.x, y: p.y});
            grid.set(`${p.x},${p.y}`, p.id);
            allTrails.push({x: p.x, y: p.y, color: p.color});
        }
        p.x += p.dx;
        p.y += p.dy;
    }

    function checkCollision(p) {
        if (p.x < 0 || p.x >= canvas.width || p.y < 0 || p.y >= canvas.height) return 'wall';
        
        let key = `${p.x},${p.y}`;
        if (!p.ghost && grid.has(key)) {
            let hitId = grid.get(key);
            if (p.swapShield) {
                p.swapShield = false;
                updateIngameUI();
                let target = players.find(t => t.id === hitId);
                if (target && target.active && target.id !== p.id) {
                    let tx = p.x, ty = p.y, tdx = p.dx, tdy = p.dy;
                    p.x = target.x; p.y = target.y; p.dx = target.dx; p.dy = target.dy;
                    target.x = tx; target.y = ty; target.dx = tdx; target.dy = tdy;
                    redrawAll();
                    return 'swapped';
                }
            }
            return 'dead';
        }
        return 'ok';
    }

    function checkGameOver() {
        const alivePlayers = players.filter(p => p.active);
        if (alivePlayers.length <= 1) {
            gameActive = false;
            clearInterval(boosterInterval);
            clearTimeout(animationId);
            
            setTimeout(() => {
                let msg = "Všichni narazili! Remíza.";
                if (alivePlayers.length === 1) {
                    msg = `Vyhrál Hráč ${alivePlayers[0].id}!`;
                    scores[alivePlayers[0].id - 1]++;
                }
                
                alert("KONEC HRY! " + msg);
                
                generateControlUI();
                document.getElementById('menu').style.display = 'block';
                document.getElementById('gameContainer').style.display = 'none';
                canvas.style.display = 'none';
            }, 100);
        }
    }

    function checkBooster(p) {
        for (let i = 0; i < boosters.length; i++) {
            let b = boosters[i];
            if (p.x < b.x + b.size + HITBOX_MARGIN && p.x + gridSize > b.x - HITBOX_MARGIN &&
                p.y < b.y + b.size + HITBOX_MARGIN && p.y + gridSize > b.y - HITBOX_MARGIN) {
                
                p.inventory = b.type;
                updateIngameUI();
                boosters.splice(i, 1);
                redrawAll();
                break;
            }
        }
    }

    function render(p) {
        ctx.fillStyle = p.color;
        ctx.shadowBlur = p.ghost ? 2 : 10;
        ctx.shadowColor = p.color;
        ctx.globalAlpha = p.ghost ? 0.5 : 1;
        ctx.fillRect(p.x, p.y, gridSize, gridSize);
        ctx.globalAlpha = 1;
    }

    updateMapPreview();
    generateControlUI();
</script>
</body>
</html>
