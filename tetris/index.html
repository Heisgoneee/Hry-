<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tetris Pro s Partikly a Kombem</title>
    <style>
        body {
            background: #121212;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #game-container { 
            display: flex; 
            gap: 30px; 
            align-items: stretch;
            justify-content: center;
        }
        .center-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .top-stats {
            display: flex;
            gap: 20px;
            width: 100%;
            justify-content: center;
        }
        .right-column {
            width: 220px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .right-column .panel {
            flex: 1;
        }
        .game-area { 
            position: relative; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        canvas {
            border: 4px solid #333;
            background-color: #000;
            display: block;
            touch-action: none;
        }
        #tetris {
            max-width: 100%;
            height: auto;
            max-height: 80vh;
        }
        #next-piece {
            border: 2px solid #333;
            margin: 0 auto;
            display: block;
        }
        .panel {
            background: #1e1e1e;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #333;
            text-align: center;
            box-sizing: border-box;
        }
        .top-stats .panel {
            flex: 1;
            min-width: 120px;
        }
        .controls-panel {
            width: 100%;
            max-width: 248px;
            font-size: 0.8em;
            color: #666;
            text-align: left;
        }
        h2 { margin: 0 0 10px 0; font-size: 1em; color: #0dc2ff; text-transform: uppercase; }
        #score { font-size: 2em; font-weight: bold; }
        #level { font-size: 1.2em; color: #F538FF; margin-top: 5px; }
        
        #menu-overlay, #pause-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #pause-overlay {
            display: none;
            z-index: 9;
        }

        #game-over-controls {
            display: none;
            flex-direction: column;
            align-items: center;
        }

        #final-score {
            font-size: 1.5em;
            color: #F538FF;
            margin-bottom: 15px;
            font-weight: bold;
        }

        input[type="text"] {
            background: #333;
            border: 1px solid #0dc2ff;
            color: white;
            padding: 8px;
            margin-bottom: 10px;
            border-radius: 4px;
            text-align: center;
            width: 150px;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
            font-size: 0.9em;
            color: #ccc;
        }

        button {
            background: #0dc2ff;
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            margin: 5px;
        }
        button:hover:not(:disabled) { background: #0099cc; transform: scale(1.05); }
        button:disabled { background: #555; cursor: not-allowed; }

        #leaderboard-list {
            list-style: none;
            padding: 0; margin: 0;
            font-size: 0.9em;
            text-align: left;
        }
        #leaderboard-list li {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #222;
        }
        .name-tag { color: #aaa; }
        .score-tag { color: #0dc2ff; font-weight: bold; }
        .loading-text { color: #F538FF; font-size: 0.8em; }

        .mobile-controls {
            display: none;
            width: 100%;
            max-width: 300px;
            margin-top: 15px;
            gap: 10px;
            flex-direction: column;
            align-items: center;
            user-select: none;
        }

        .control-row {
            display: flex;
            gap: 15px;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #0dc2ff;
            color: #0dc2ff;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            touch-action: manipulation;
        }
        .control-btn:active {
            background: rgba(13, 194, 255, 0.3);
        }

        @media (max-width: 768px) {
            #game-container {
                flex-direction: column;
                gap: 10px;
                padding: 10px;
                align-items: center;
            }
            .right-column {
                width: 100%;
                max-width: 300px;
            }
            .top-stats {
                max-width: 300px;
            }
            #leaderboard-list {
                display: none;
            }
            .mobile-controls {
                display: flex;
            }
            .controls-panel {
                display: none;
            }
            .right-column .panel {
                flex: none;
            }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="center-column">
        <div class="top-stats">
            <div class="panel">
                <h2>DALŠÍ BLOK</h2>
                <canvas id="next-piece" width="80" height="80"></canvas>
            </div>
            <div class="panel">
                <h2>SKÓRE</h2>
                <div id="score">0</div>
                <div id="level">Úroveň: 1</div>
            </div>
        </div>

        <div class="game-area">
            <div id="menu-overlay">
                <h1 id="status-text">TETRIS</h1>
                
                <div id="game-over-controls">
                    <div id="final-score"></div>
                    <input type="text" id="player-name" placeholder="Tvé jméno" maxlength="10">
                    <div class="checkbox-container">
                        <input type="checkbox" id="save-score-cb" checked>
                        <label for="save-score-cb">Uložit skóre do žebříčku</label>
                    </div>
                </div>

                <button id="start-btn">SPUSTIT HRU</button>
            </div>

            <div id="pause-overlay">
                <h1 style="color: #FF8E0D;">POZASTAVENO</h1>
                <button id="resume-btn">POKRAČOVAT</button>
                <button id="restart-btn" style="background: #FF0D72;">RESTARTOVAT</button>
            </div>

            <canvas id="tetris" width="240" height="400"></canvas>
        </div>

        <div class="mobile-controls">
            <div class="control-row">
                <div class="control-btn" id="btn-rot-l">↶</div>
                <div class="control-btn" id="btn-up">↻</div>
                <div class="control-btn" id="btn-rot-r">↷</div>
            </div>
            <div class="control-row">
                <div class="control-btn" id="btn-left">◀</div>
                <div class="control-btn" id="btn-down">▼</div>
                <div class="control-btn" id="btn-right">▶</div>
            </div>
            <div class="control-row" style="margin-top: 5px;">
                <button id="btn-mobile-pause" style="padding: 10px 20px; background: #FF8E0D; border-radius: 8px;">⏸ PAUZA</button>
            </div>
        </div>

        <div class="panel controls-panel">
            <strong>Ovládání PC:</strong><br>
            Šipky: Pohyb a pád<br>
            Nahoru: Rotace vpravo<br>
            Q / W: Rotace<br>
            ESC / P: Pauza
        </div>
    </div>

    <div class="right-column">
        <div class="panel">
            <h2>TOP HRÁČI</h2>
            <ul id="leaderboard-list">
                <li class="loading-text">Načítání...</li>
            </ul>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBnFQf-YQODWhZN-3scSbWIQIgr3poDIos",
      authDomain: "tetris-5e14c.firebaseapp.com",
      projectId: "tetris-5e14c",
      storageBucket: "tetris-5e14c.firebasestorage.app",
      messagingSenderId: "923778243713",
      appId: "1:923778243713:web:93407ae55bd67465244180",
      measurementId: "G-FM09K6MC95"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const canvas = document.getElementById('tetris');
    const context = canvas.getContext('2d');
    const nextCanvas = document.getElementById('next-piece');
    const nextContext = nextCanvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const levelElement = document.getElementById('level');
    const startBtn = document.getElementById('start-btn');
    const nameInput = document.getElementById('player-name');
    const saveScoreCb = document.getElementById('save-score-cb');
    const menuOverlay = document.getElementById('menu-overlay');
    const statusText = document.getElementById('status-text');
    const leaderboardList = document.getElementById('leaderboard-list');
    const gameOverControls = document.getElementById('game-over-controls');
    const finalScoreElement = document.getElementById('final-score');
    
    const pauseOverlay = document.getElementById('pause-overlay');
    const resumeBtn = document.getElementById('resume-btn');
    const restartBtn = document.getElementById('restart-btn');

    context.scale(20, 20);
    nextContext.scale(20, 20);

    const colors = [null, '#FF0D72', '#0DC2FF', '#0DFF72', '#F538FF', '#FF8E0D', '#FFE138', '#3877FF'];

    let nextPieceMatrix = null;
    let particles = [];
    let floatingTexts = [];
    let isPaused = false;
    let shakeTime = 0;
    let currentCombo = 0;

    function createMatrix(w, h) {
        const matrix = [];
        while (h--) matrix.push(new Array(w).fill(0));
        return matrix;
    }

    function createPiece(type) {
        if (type === 'I') return [[0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0]];
        if (type === 'L') return [[0, 2, 0], [0, 2, 0], [0, 2, 2]];
        if (type === 'J') return [[0, 3, 0], [0, 3, 0], [3, 3, 0]];
        if (type === 'O') return [[4, 4], [4, 4]];
        if (type === 'Z') return [[5, 5, 0], [0, 5, 5], [0, 0, 0]];
        if (type === 'S') return [[0, 6, 6], [6, 6, 0], [0, 0, 0]];
        if (type === 'T') return [[0, 7, 0], [7, 7, 7], [0, 0, 0]];
    }

    function drawGrid() {
        context.strokeStyle = '#222';
        context.lineWidth = 0.05;
        for (let x = 0; x < canvas.width; x++) {
            context.beginPath();
            context.moveTo(x, 0);
            context.lineTo(x, canvas.height);
            context.stroke();
        }
        for (let y = 0; y < canvas.height; y++) {
            context.beginPath();
            context.moveTo(0, y);
            context.lineTo(canvas.width, y);
            context.stroke();
        }
    }

    function drawNextPiece() {
        nextContext.fillStyle = '#000';
        nextContext.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
        
        if (!nextPieceMatrix) return;
        
        const offsetX = (4 - nextPieceMatrix[0].length) / 2;
        const offsetY = (4 - nextPieceMatrix.length) / 2;

        nextPieceMatrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) {
                    nextContext.fillStyle = colors[value];
                    nextContext.fillRect(x + offsetX, y + offsetY, 1, 1);
                    nextContext.strokeStyle = 'rgba(0,0,0,0.3)';
                    nextContext.lineWidth = 0.1;
                    nextContext.strokeRect(x + offsetX, y + offsetY, 1, 1);
                }
            });
        });
    }

    function draw() {
        context.fillStyle = '#000';
        context.fillRect(0, 0, canvas.width, canvas.height);
        
        context.save();
        if (shakeTime > 0) {
            context.translate((Math.random() - 0.5) * 0.8, (Math.random() - 0.5) * 0.8);
            shakeTime--;
        }

        drawGrid();
        drawMatrix(arena, {x: 0, y: 0});
        drawMatrix(player.matrix, player.pos);
        drawParticles();
        drawFloatingTexts();

        context.restore();
    }

    function drawMatrix(matrix, offset) {
        if(!matrix) return;
        matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) {
                    context.fillStyle = colors[value];
                    context.fillRect(x + offset.x, y + offset.y, 1, 1);
                    context.strokeStyle = 'rgba(0,0,0,0.3)';
                    context.lineWidth = 0.1;
                    context.strokeRect(x + offset.x, y + offset.y, 1, 1);
                }
            });
        });
    }

    function drawParticles() {
        context.save();
        particles.forEach(p => {
            context.fillStyle = p.color;
            context.globalAlpha = Math.max(0, Math.min(1, p.life));
            context.shadowBlur = 5;
            context.shadowColor = p.color;
            let s = p.size || 0.3;
            context.fillRect(p.x - s/2, p.y - s/2, s, s);
        });
        context.restore();
    }

    function drawFloatingTexts() {
        context.save();
        context.scale(1/20, 1/20);
        context.textAlign = "center";
        context.textBaseline = "middle";
        floatingTexts.forEach(ft => {
            context.globalAlpha = Math.max(0, Math.min(1, ft.life));
            context.font = "bold 28px 'Segoe UI'";
            
            context.fillStyle = ft.color;
            context.shadowColor = ft.color;
            context.shadowBlur = 15;
            context.fillText(ft.text, ft.x * 20, ft.y * 20);
            
            context.shadowBlur = 0;
            context.fillStyle = "#ffffff";
            context.fillText(ft.text, ft.x * 20, ft.y * 20);
        });
        context.restore();
    }

    function updateParticles() {
        particles.forEach(p => {
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.03; 
            p.life -= 0.015;
            if (p.size) p.size *= 0.96;
        });
        particles = particles.filter(p => p.life > 0);
    }

    function updateFloatingTexts() {
        floatingTexts.forEach(ft => {
            ft.y -= 0.06; 
            ft.life -= 0.02;
        });
        floatingTexts = floatingTexts.filter(ft => ft.life > 0);
    }

    function collide(arena, player) {
        const [m, o] = [player.matrix, player.pos];
        for (let y = 0; y < m.length; ++y) {
            for (let x = 0; x < m[y].length; ++x) {
                if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                    return true;
                }
            }
        }
        return false;
    }

    function merge(arena, player) {
        player.matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) {
                    arena[y + player.pos.y][x + player.pos.x] = value;
                }
            });
        });
    }

    function rotate(matrix, dir) {
        for (let y = 0; y < matrix.length; ++y) {
            for (let x = 0; x < y; ++x) {
                [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
            }
        }
        if (dir > 0) matrix.forEach(row => row.reverse());
        else matrix.reverse();
    }

    function arenaSweep() {
        let linesCleared = 0;
        outer: for (let y = arena.length - 1; y > 0; --y) {
            for (let x = 0; x < arena[y].length; ++x) {
                if (arena[y][x] === 0) continue outer;
            }

            linesCleared++;
            for (let x = 0; x < arena[y].length; ++x) {
                let color = colors[arena[y][x]];
                
                for (let i = 0; i < 15; i++) {
                    particles.push({
                        x: x + 0.5,
                        y: y + 0.5,
                        vx: (Math.random() - 0.5) * 1.5,
                        vy: (Math.random() - 0.5) * 1.5,
                        life: 1 + Math.random(),
                        color: color,
                        size: 0.1 + Math.random() * 0.5
                    });
                }
                
                for (let i = 0; i < 5; i++) {
                    particles.push({
                        x: x + Math.random(),
                        y: y + Math.random(),
                        vx: (Math.random() - 0.5) * 2,
                        vy: (Math.random() - 1) * 2,
                        life: 0.5 + Math.random() * 0.5,
                        color: '#FFFFFF',
                        size: 0.15
                    });
                }
            }

            const row = arena.splice(y, 1)[0].fill(0);
            arena.unshift(row);
            ++y;
        }

        if (linesCleared > 0) {
            let comboText = "";
            let comboColor = "";
            let points = 0;

            if (linesCleared === 1) {
                points = 100;
                shakeTime = 5;
            } else if (linesCleared === 2) {
                points = 300;
                comboText = "DVOJITÁ!";
                comboColor = "#0DC2FF";
                shakeTime = 10;
            } else if (linesCleared === 3) {
                points = 500;
                comboText = "TROJITÁ!";
                comboColor = "#FFE138";
                shakeTime = 15;
            } else if (linesCleared >= 4) {
                points = 800;
                comboText = "TETRIS!";
                comboColor = "#FF0D72";
                shakeTime = 25;
            }

            player.score += points * currentLevel;

            if (currentCombo > 0) {
                let comboPoints = 50 * currentCombo * currentLevel;
                player.score += comboPoints;
                
                floatingTexts.push({
                    text: currentCombo + "x COMBO!",
                    x: 6,
                    y: player.pos.y > 6 ? player.pos.y - 4 : 4,
                    life: 2,
                    color: "#0DFF72"
                });
                shakeTime += 5;
            }

            if (comboText !== "") {
                floatingTexts.push({
                    text: comboText,
                    x: 6,
                    y: player.pos.y > 5 ? player.pos.y - 2 : 5,
                    life: 1.5,
                    color: comboColor
                });
            }

            currentCombo++;
        } else {
            currentCombo = 0;
        }

        updateScore();
    }

    function playerDrop() {
        player.pos.y++;
        if (collide(arena, player)) {
            player.pos.y--;
            merge(arena, player);
            playerReset();
            arenaSweep();
        }
        dropCounter = 0;
    }

    function playerMove(dir) {
        player.pos.x += dir;
        if (collide(arena, player)) player.pos.x -= dir;
    }

    function playerReset() {
        const pieces = 'ILJOTSZ';
        if (!nextPieceMatrix) {
            nextPieceMatrix = createPiece(pieces[pieces.length * Math.random() | 0]);
        }
        
        player.matrix = nextPieceMatrix;
        nextPieceMatrix = createPiece(pieces[pieces.length * Math.random() | 0]);
        drawNextPiece();

        player.pos.y = 0;
        player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
        
        if (collide(arena, player)) {
            gameOver();
        }
    }

    function playerRotate(dir) {
        const pos = player.pos.x;
        let offset = 1;
        rotate(player.matrix, dir);
        while (collide(arena, player)) {
            player.pos.x += offset;
            offset = -(offset + (offset > 0 ? 1 : -1));
            if (offset > player.matrix[0].length) {
                rotate(player.matrix, -dir);
                player.pos.x = pos;
                return;
            }
        }
    }

    let dropCounter = 0;
    let dropInterval = 800;
    let lastTime = 0;
    let gameRunning = false;
    let currentLevel = 1;

    function update(time = 0) {
        if (!gameRunning || isPaused) return;
        const deltaTime = time - lastTime;
        lastTime = time;
        dropCounter += deltaTime;
        if (dropCounter > dropInterval) playerDrop();
        
        updateParticles();
        updateFloatingTexts();
        draw();
        requestAnimationFrame(update);
    }

    function updateScore() {
        scoreElement.innerText = player.score;
        currentLevel = Math.floor(player.score / 1000) + 1;
        levelElement.innerText = "Úroveň: " + currentLevel;
        dropInterval = Math.max(250, 800 - (currentLevel - 1) * 25);
    }

    function gameOver() {
        gameRunning = false;
        isPaused = false;
        pauseOverlay.style.display = 'none';
        menuOverlay.style.display = 'flex';
        gameOverControls.style.display = 'flex';
        statusText.innerText = "KONEC HRY";
        finalScoreElement.innerText = "Skóre: " + player.score;
        startBtn.innerText = "HRÁT ZNOVU";
    }

    function togglePause() {
        if (!gameRunning) return;
        isPaused = !isPaused;
        if (isPaused) {
            pauseOverlay.style.display = 'flex';
        } else {
            pauseOverlay.style.display = 'none';
            lastTime = performance.now();
            requestAnimationFrame(update);
        }
    }

    async function saveScore(name, score) {
        try {
            await addDoc(collection(db, "tetris_leaderboard"), {
                name: name,
                score: score,
                timestamp: new Date()
            });
            await displayLeaderboard();
        } catch (e) {
            console.error("Chyba při ukládání skóre: ", e);
        }
    }

    async function displayLeaderboard() {
        try {
            const q = query(collection(db, "tetris_leaderboard"), orderBy("score", "desc"), limit(18));
            const querySnapshot = await getDocs(q);
            let html = "";
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                html += `<li><span class="name-tag">${data.name}</span> <span class="score-tag">${data.score}</span></li>`;
            });
            leaderboardList.innerHTML = html || "<li class='loading-text'>Zatím žádné skóre</li>";
        } catch (e) {
            console.error("Chyba při načítání žebříčku: ", e);
            leaderboardList.innerHTML = "<li class='loading-text'>Nelze načíst data</li>";
        }
    }

    const arena = createMatrix(12, 20);
    const player = { pos: {x: 0, y: 0}, matrix: null, score: 0 };

    function startGame() {
        arena.forEach(row => row.fill(0));
        player.score = 0;
        currentLevel = 1;
        dropInterval = 800;
        particles = [];
        floatingTexts = [];
        isPaused = false;
        shakeTime = 0;
        currentCombo = 0;
        updateScore();
        playerReset();
        gameRunning = true;
        menuOverlay.style.display = 'none';
        pauseOverlay.style.display = 'none';
        lastTime = performance.now();
        update();
    }

    document.addEventListener('keydown', event => {
        if (!gameRunning) return;

        if (event.keyCode === 27 || event.keyCode === 80) {
            togglePause();
            return;
        }

        if (isPaused) return;

        if (event.keyCode === 37) playerMove(-1);
        else if (event.keyCode === 39) playerMove(1);
        else if (event.keyCode === 40) playerDrop();
        else if (event.keyCode === 81) playerRotate(-1);
        else if (event.keyCode === 87 || event.keyCode === 38) playerRotate(1);
    });

    function bindTouchControl(id, action) {
        const btn = document.getElementById(id);
        if (!btn) return;
        btn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameRunning && !isPaused) action();
        });
        btn.addEventListener('mousedown', (e) => {
            e.preventDefault();
            if (gameRunning && !isPaused) action();
        });
    }

    bindTouchControl('btn-left', () => playerMove(-1));
    bindTouchControl('btn-right', () => playerMove(1));
    bindTouchControl('btn-down', () => playerDrop());
    bindTouchControl('btn-rot-l', () => playerRotate(-1));
    bindTouchControl('btn-rot-r', () => playerRotate(1));
    bindTouchControl('btn-up', () => playerRotate(1));

    document.getElementById('btn-mobile-pause').addEventListener('click', () => {
        togglePause();
    });

    resumeBtn.addEventListener('click', () => togglePause());
    restartBtn.addEventListener('click', () => {
        gameOverControls.style.display = 'none';
        startGame();
    });

    startBtn.addEventListener('click', async () => {
        if (!gameRunning && statusText.innerText === "KONEC HRY") {
            if (saveScoreCb.checked && player.score > 0) {
                const name = nameInput.value.trim() || "Anonym";
                statusText.innerText = "Ukládání skóre...";
                startBtn.disabled = true;
                await saveScore(name, player.score);
                startBtn.disabled = false;
            }
        }
        
        gameOverControls.style.display = 'none';
        startBtn.innerText = "SPUSTIT HRU";
        statusText.innerText = "TETRIS";
        startGame();
    });

    displayLeaderboard();
    drawNextPiece();
    draw();
</script>
</body>
</html>
