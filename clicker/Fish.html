<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meme Clicker - Rybičky (Vývojová verze)</title>
    <style>
        body { font-family: 'Comic Sans MS', sans-serif; background-color: #2c3e50; color: white; text-align: center; margin: 0; padding: 20px; overflow-x: hidden; }
        .header { background: rgba(0,0,0,0.5); padding: 15px; border-radius: 10px; border: 2px solid #3498db; margin-bottom: 20px; display: inline-block; }
        .header span { color: #f1c40f; font-weight: bold; font-size: 24px; }
        
        #aquarium { width: 90vw; height: 50vh; background: linear-gradient(to bottom, #74b9ff, #0984e3); border: 5px solid #2980b9; border-radius: 20px; margin: 0 auto; position: relative; overflow: hidden; box-shadow: inset 0 0 50px rgba(0,0,0,0.3); }
        
        .fish { position: absolute; transition: top 2s ease-in-out, left 2s ease-in-out, transform 0.5s; cursor: pointer; user-select: none; }
        .fish .status { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); font-size: 12px; background: rgba(0,0,0,0.8); padding: 4px 8px; border-radius: 5px; white-space: nowrap; pointer-events: none; border: 1px solid #7f8c8d; }
        .fish .status span { color: #2ecc71; font-weight: bold; }
        
        .shop { margin-top: 20px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .btn { padding: 15px 25px; font-size: 18px; cursor: pointer; background: #3498db; color: white; border: none; border-radius: 10px; font-weight: bold; font-family: inherit; transition: 0.2s; border: 2px solid #2980b9; }
        .btn:hover { background: #2980b9; transform: scale(1.05); }
        .btn:disabled { background: #7f8c8d; border-color: #95a5a6; cursor: not-allowed; transform: none; }
        .btn-sell { background: #e74c3c; border-color: #c0392b; }
        .btn-sell:hover { background: #c0392b; }
        .btn-food { background: #2ecc71; border-color: #27ae60; }
        .btn-food:hover { background: #27ae60; }
        
        .food-particle { position: absolute; font-size: 15px; z-index: 5; animation: sink 3s linear forwards; pointer-events: none; }
        @keyframes sink { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(200px); opacity: 0; } }
    </style>
</head>
<body>

    <div class="header">
        Testovací Skóre: <span id="score-display">1000</span>
    </div>

    <div id="aquarium"></div>

    <div class="shop">
        <button id="btn-buy-fish" class="btn">🐟 Koupit rybu (100)</button>
        <button id="btn-buy-food" class="btn btn-food">🥫 Nakrmit všechny (10 / ryba)</button>
    </div>
    
    <p style="color: #bdc3c7; font-size: 14px;">Kliknutím na rybu ji prodáš. (Čím větší stádium, tím větší zisk!)</p>

    <script>
        let testScore = 1000;
        let fishes = [];
        let fishIdCounter = 0;
        
        const aquarium = document.getElementById('aquarium');
        
        // Stádia ryby. Defaultně roste 10 minut (600 sekund). S jídlem to půjde 2x rychleji.
        const STAGES = {
            1: { icon: '🐟', size: '30px', value: 100, name: "Potěr" },
            2: { icon: '🐡', size: '50px', value: 500, name: "Ryba" },
            3: { icon: '🐋', size: '80px', value: 3000, name: "Gigachad Velryba" }
        };

        function updateUI() {
            document.getElementById('score-display').textContent = testScore;
            document.getElementById('btn-buy-fish').disabled = testScore < 100;
            document.getElementById('btn-buy-food').disabled = testScore < (fishes.length * 10) || fishes.length === 0;
        }

        function spawnFoodAnimation() {
            for(let i=0; i < fishes.length; i++) {
                const f = document.createElement('div');
                f.className = 'food-particle';
                f.textContent = '🧆';
                f.style.left = (20 + Math.random() * 60) + '%';
                f.style.top = '10px';
                aquarium.appendChild(f);
                setTimeout(() => f.remove(), 3000);
            }
        }

        function createFish() {
            if (testScore < 100) return;
            testScore -= 100;
            
            const id = fishIdCounter++;
            const el = document.createElement('div');
            el.className = 'fish';
            el.id = 'fish-' + id;
            
            const statusEl = document.createElement('div');
            statusEl.className = 'status';
            el.appendChild(statusEl);
            
            const iconEl = document.createElement('span');
            iconEl.className = 'icon';
            el.appendChild(iconEl);

            el.addEventListener('click', () => sellFish(id));
            aquarium.appendChild(el);

            const newFish = {
                id: id,
                el: el,
                iconEl: iconEl,
                statusEl: statusEl,
                stage: 1,
                growth: 0, // 0 až 100%
                fedTime: 0, // Kolik sekund zbývá boostu z jídla
                x: 50,
                y: 50,
                facingRight: true
            };

            fishes.push(newFish);
            updateFishVisuals(newFish);
            updateUI();
        }

        function updateFishVisuals(fish) {
            const stageData = STAGES[fish.stage];
            fish.iconEl.textContent = stageData.icon;
            fish.iconEl.style.fontSize = stageData.size;
            
            let statusText = `${stageData.name} `;
            
            if (fish.stage < 3) {
                statusText += `| ${Math.floor(fish.growth)}% `;
                if (fish.fedTime > 0) {
                    statusText += `🚀`; // Boost indicator
                    fish.statusEl.style.borderColor = '#2ecc71';
                } else {
                    fish.statusEl.style.borderColor = '#7f8c8d';
                }
            } else {
                statusText += `| MAX`;
                fish.statusEl.style.borderColor = '#f1c40f';
            }

            fish.statusEl.innerHTML = statusText;

            fish.el.style.left = fish.x + '%';
            fish.el.style.top = fish.y + '%';
            fish.el.style.transform = fish.facingRight ? 'scaleX(-1)' : 'scaleX(1)';
        }

        function sellFish(id) {
            const index = fishes.findIndex(f => f.id === id);
            if (index === -1) return;
            
            const fish = fishes[index];
            const value = STAGES[fish.stage].value;
            
            testScore += value;
            fish.el.remove();
            fishes.splice(index, 1);
            updateUI();
        }

        function feedFishes() {
            const cost = fishes.length * 10;
            if (testScore < cost || fishes.length === 0) return;
            
            testScore -= cost;
            spawnFoodAnimation();
            
            fishes.forEach(fish => {
                // Přidá rybě 5 minut (300 sekund) double speed boostu (stačí to akorát na jedno celé stádium)
                fish.fedTime += 300; 
                updateFishVisuals(fish);
            });
            updateUI();
        }

        document.getElementById('btn-buy-fish').addEventListener('click', createFish);
        document.getElementById('btn-buy-food').addEventListener('click', feedFishes);

        // Herní smyčka
        setInterval(() => {
            fishes.forEach(fish => {
                
                if (fish.stage < 3) {
                    // Základní růst je 10 minut = 600 sekund. Za 1 sekundu vyroste o 100/600 %.
                    let growthRate = 100 / 600; 
                    
                    if (fish.fedTime > 0) {
                        growthRate *= 2; // Rychlost x2 s jídlem (5 minut)
                        fish.fedTime--;
                    }

                    fish.growth += growthRate;

                    if (fish.growth >= 100) {
                        fish.stage++;
                        fish.growth = 0;
                    }
                }

                // Náhodný pohyb
                if (Math.random() > 0.5) {
                    const nextX = Math.max(5, Math.min(90, fish.x + (Math.random() * 20 - 10)));
                    const nextY = Math.max(10, Math.min(80, fish.y + (Math.random() * 20 - 10)));
                    
                    fish.facingRight = nextX > fish.x;
                    fish.x = nextX;
                    fish.y = nextY;
                }

                updateFishVisuals(fish);
            });
            updateUI();
        }, 1000); // 1 sekunda

        updateUI();
    </script>
</body>
</html>
