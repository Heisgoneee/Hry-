<div class="panel" id="boss-panel-locked" style="border-color: #c0392b; width: 340px;">
    <h3 style="color: #c0392b;">👹 Boss Fight (Multiplayer)</h3>
    <p style="font-size: 13px; opacity: 0.8;">Bojuj společně s ostatními hráči proti globálnímu Bossovi, expi svůj level a získej odměny!</p>
    <button id="btn-unlock-boss" class="btn" style="background: #e74c3c; color: white; margin-top: 10px;">Odemknout (1M bodů)</button>
</div>

<div class="panel" id="boss-panel-ui" style="display: none; border-color: #c0392b; width: 340px;">
    <h3 style="color: #c0392b; margin-top: 0;">
        👹 Globální Boss 
        <button id="btn-refresh-boss" class="btn" style="width:auto; font-size: 10px; padding: 4px 8px; float: right; background: #e74c3c; color: white; border: none; margin-top: -2px; margin-left: 8px;">🔄 Aktualizovat</button>
        <span id="boss-level" style="font-size: 14px; float: right; background: #c0392b; color: white; padding: 2px 6px; border-radius: 5px;">Lvl 1</span>
    </h3>
    
    <div style="background: rgba(0,0,0,0.1); padding: 10px; border-radius: 10px; text-align: center; margin-bottom: 10px;">
        <div style="font-weight: bold; margin-bottom: 5px; font-size: 14px;">HP: <span id="boss-hp-text">1,000,000 / 1,000,000</span></div>
        <div style="width: 100%; background: #333; height: 15px; border-radius: 10px; overflow: hidden; border: 2px solid #222;">
            <div id="boss-hp-bar" style="width: 100%; background: #e74c3c; height: 100%; transition: width 0.2s;"></div>
        </div>
    </div>

    <div style="background: rgba(41, 128, 185, 0.1); padding: 8px 10px; border-radius: 8px; border: 1px dashed #2980b9; margin-bottom: 15px; font-size: 12px;">
        <div style="display: flex; justify-content: space-between; font-weight: bold; color: #2980b9;">
            <span>Tvůj Level: <span id="player-boss-lvl" style="color:#e74c3c; font-size: 14px;">1</span></span>
            <span>XP: <span id="player-boss-xp">0 / 100</span></span>
        </div>
        <div style="width: 100%; background: #ccc; height: 6px; border-radius: 3px; margin-top: 5px; overflow: hidden;">
            <div id="player-boss-xp-bar" style="width: 0%; background: #3498db; height: 100%;"></div>
        </div>
    </div>

    <div style="text-align: center; margin-bottom: 15px;">
        <div id="boss-click-btn" style="font-size: 80px; cursor: pointer; user-select: none; transition: transform 0.05s; display: inline-block; filter: drop-shadow(0 0 10px rgba(192, 57, 43, 0.6));">👿</div>
    </div>

    <div style="display: flex; justify-content: space-between; align-items: center; background: #222; color: #f1c40f; padding: 10px; border-radius: 8px; margin-bottom: 10px;">
        <strong style="font-family: monospace; font-size: 18px;">💰 <span id="boss-money">0</span></strong>
        <span style="font-size: 12px; color: #aaa; text-transform: uppercase;">Boss Zlaťáky</span>
    </div>

    <div style="display: flex; flex-direction: column; gap: 5px;">
        <button id="btn-boss-upg-dmg" class="btn" style="background: #34495e; color: white; border-color: #2c3e50;">
            🗡️ Lepší zbraň <b id="boss-lvl-dmg" style="color: #e74c3c;">[1]</b>
            <span id="boss-cost-dmg">10</span>
            <small style="color: #ccc;">Základní DMG do bosse +1</small>
        </button>
        <button id="btn-boss-upg-gold" class="btn" style="background: #f39c12; color: white; border-color: #e67e22;">
            🪙 Zisk Goldů <b id="boss-lvl-gold" style="color: #fff;">[1]</b>
            <span id="boss-cost-gold">50</span>
            <small id="boss-req-gold" style="color: #eee;">Zisk mincí z bosse +1</small>
        </button>
        <button id="btn-boss-upg-xp" class="btn" style="background: #27ae60; color: white; border-color: #2ecc71;">
            ✨ Zisk XP <b id="boss-lvl-xp" style="color: #fff;">[1]</b>
            <span id="boss-cost-xp">100</span>
            <small id="boss-req-xp" style="color: #eee;">Zisk XP z bosse +1</small>
        </button>
        <button id="btn-boss-upg-count" class="btn" style="background: #8e44ad; color: white; border-color: #9b59b6;">
            ⚔️ Více Zbraní <b id="boss-lvl-count" style="color: #fff;">[1]</b>
            <span id="boss-cost-count">500</span>
            <small id="boss-req-count" style="color: #eee;">Počet útoků naráz +1</small>
        </button>
        <button id="btn-boss-upg-enchant" class="btn" style="background: #e74c3c; color: white; border-color: #c0392b;">
            🔮 Enchant Zbraně <b id="boss-lvl-enchant" style="color: #fff;">[1]</b>
            <span id="boss-cost-enchant">1k</span>
            <small id="boss-req-enchant" style="color: #eee;">Násobič celkového DMG +1x</small>
        </button>
    </div>
</div>
