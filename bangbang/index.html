<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Bank Heist CO-OP | Railway</title>
    <style>
        body { background: #1a1a1a; color: white; text-align: center; font-family: sans-serif; margin: 0; overflow: hidden; }
        canvas { background: #333; border: 4px solid #111; cursor: crosshair; margin-top: 10px; }
        .ui { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 5px; text-align: left; }
        .hp-bar { width: 150px; height: 15px; background: #400; margin-top: 5px; }
        .hp-fill { height: 100%; background: #f00; transition: width 0.1s; }
    </style>
</head>
<body>
    <div class="ui">
        <div style="color: gold; font-weight: bold;">LUP: $<span id="money">0</span></div>
        <div>HP:</div>
        <div class="hp-bar"><div id="hp-fill" class="hp-fill"></div></div>
    </div>
    <canvas id="game" width="800" height="600"></canvas>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        // SEM VLOŽ ADRESU Z RAILWAY (např. https://web-production-abc.up.railway.app)
        const RAILWAY_URL = 'http://localhost:3000'; 
        const socket = io(RAILWAY_URL);

        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        let gameState = null;
        let localPos = { x: 400, y: 500 };
        const keys = {};

        window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
        window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

        canvas.onmousedown = (e) => {
            if (!gameState || !gameState.players[socket.id] || gameState.players[socket.id].hp <= 0) return;
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            gameState.cops.forEach(cop => {
                if (mx > cop.x && mx < cop.x + 30 && my > cop.y && my < cop.y + 30) socket.emit('shoot', cop.id);
            });
        };

        socket.on('gameState', (data) => {
            gameState = data;
            if (gameState.players[socket.id]) {
                document.getElementById('money').innerText = gameState.vault.money;
                document.getElementById('hp-fill').style.width = gameState.players[socket.id].hp + "%";
            }
        });

        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (!gameState) {
                ctx.fillStyle = "white"; ctx.fillText("Načítání z Railway...", 350, 300);
                requestAnimationFrame(loop); return;
            }

            // 1. Zdi a Trezor
            ctx.fillStyle = "#222"; gameState.walls.forEach(w => ctx.fillRect(w.x, w.y, w.w, w.h));
            ctx.fillStyle = "gold"; ctx.fillRect(350, 20, 100, 100);

            // 2. Policisté
            gameState.cops.forEach(cop => {
                ctx.fillStyle = "blue"; ctx.fillRect(cop.x, cop.y, 30, 30);
                ctx.fillStyle = "red"; ctx.fillRect(cop.x, cop.y-8, (cop.hp/50)*30, 4);
            });

            // 3. Střely
            ctx.fillStyle = "white";
            gameState.bullets.forEach(b => {
                ctx.beginPath(); ctx.arc(b.x, b.y, 3, 0, Math.PI*2); ctx.fill();
            });

            // 4. Hráči
            for (let id in gameState.players) {
                let p = gameState.players[id];
                if (p.hp <= 0) continue;
                ctx.fillStyle = (id === socket.id) ? "#0f0" : "#f90";
                let drawX = (id === socket.id) ? localPos.x : p.x;
                let drawY = (id === socket.id) ? localPos.y : p.y;
                ctx.fillRect(drawX, drawY, 40, 40);
            }

            // 5. Pohyb a Prediction
            if (gameState.players[socket.id]?.hp > 0) {
                let moved = false;
                let nx = localPos.x, ny = localPos.y;
                if (keys['w']) { ny -= 5; moved = true; }
                if (keys['s']) { ny += 5; moved = true; }
                if (keys['a']) { nx -= 5; moved = true; }
                if (keys['d']) { nx += 5; moved = true; }
                
                // Jednoduchá kontrola zdí
                let canGo = true;
                gameState.walls.forEach(w => {
                    if (nx < w.x+w.w && nx+40 > w.x && ny < w.y+w.h && ny+40 > w.y) canGo = false;
                });

                if (moved && canGo) {
                    localPos.x = nx; localPos.y = ny;
                    socket.emit('move', { x: localPos.x, y: localPos.y });
                }
            }

            // 6. Game Over
            if (gameState.players[socket.id]?.hp <= 0) {
                ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0,0,800,600);
                ctx.fillStyle = "white"; ctx.font = "30px Arial"; ctx.fillText("KONEC HRY! R pro restart", 240, 300);
                if (keys['r']) { socket.emit('respawn'); localPos = {x:400, y:500}; }
            }

            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
