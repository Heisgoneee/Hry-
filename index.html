<!DOCTYPE html>

        .icon { font-size: 4rem; margin-bottom: 15px; display: block; }
        h3 { font-size: 1.5rem; margin: 10px 0; color: #38bdf8; }
        p { color: #94a3b8; line-height: 1.5; }
    </style>
</head>
<body>

        <h1>HERNÍ PORTÁL</h1>
        <p>Sbírka mých HTML5 her hostovaných na GitHubu</p>

        </a>
        <a href="tron/index.html" class="card">

            <h3>Discwar</h3>
            <p>Házej disky a tref cíl!</p>
        </a>
    </div>
</body>
</html>
