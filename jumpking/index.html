<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Jump King: HTML Edition</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #0a0a0c; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        #gameWrapper {
            position: relative;
        }
        canvas { 
            border: 5px solid #111; 
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            background: #0a0a0f;
            display: block;
        }
        #ui { 
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 8px;
            z-index: 10;
            width: 80%;
            display: none;
            pointer-events: none;
        }
        .controls { font-weight: bold; color: #f1c40f; }
        
        #startScreen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 15, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }
        #startScreen h1 { color: #f1c40f; font-size: 40px; margin-bottom: 10px; }
        #playerName {
            padding: 10px; font-size: 18px; border-radius: 5px; border: none;
            margin-bottom: 15px; text-align: center;
        }
        #startBtn {
            padding: 10px 30px; font-size: 20px; font-weight: bold;
            background: #e74c3c; color: white; border: none; border-radius: 5px;
            cursor: pointer; margin-bottom: 30px; transition: 0.2s;
        }
        #startBtn:hover { background: #c0392b; }
        
        #leaderboardContainer {
            background: rgba(0,0,0,0.5); padding: 20px; border-radius: 10px;
            width: 300px; text-align: center; border: 2px solid #333;
        }
        #leaderboardContainer h3 { margin-top: 0; color: #2ecc71; }
        .lb-entry {
            display: flex; justify-content: space-between; margin: 5px 0;
            border-bottom: 1px solid #444; padding-bottom: 5px;
        }
    </style>
</head>
<body>

<div id="gameWrapper">
    <div id="startScreen">
        <h1>👑 JUMP KING CLONE</h1>
        <input type="text" id="playerName" placeholder="Zadej svůj nick" maxlength="15">
        <button id="startBtn">HRÁT</button>
        
        <div id="leaderboardContainer">
            <h3>Top Časy (Síň slávy)</h3>
            <div id="leaderboardList">Načítání...</div>
        </div>
    </div>

    <div id="ui">
        <span style="float: left;" id="timeDisplay">Čas: 0:00</span>
        <span><span class="controls">A/D</span> pohyb | <span class="controls">Mezerník</span> skok</span>
        <span style="float: right;" id="locationDisplay">Lokace</span>
    </div>
    <canvas id="gameCanvas"></canvas>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBnFQf-YQODWhZN-3scSbWIQIgr3poDIos",
  authDomain: "tetris-5e14c.firebaseapp.com",
  projectId: "tetris-5e14c",
  storageBucket: "tetris-5e14c.firebasestorage.app",
  messagingSenderId: "923778243713",
  appId: "1:923778243713:web:d73ab81b9e38341e244180",
  measurementId: "G-EW7EV6T07T"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

canvas.width = 800;
canvas.height = 700;

let gameState = 'START'; 
let currentPlayerName = "Anonym";
let startTime = 0;
let elapsedTime = 0;

const startScreen = document.getElementById('startScreen');
const uiScreen = document.getElementById('ui');
const startBtn = document.getElementById('startBtn');
const nameInput = document.getElementById('playerName');
const lbList = document.getElementById('leaderboardList');
const timeDisplay = document.getElementById('timeDisplay');
const locationDisplay = document.getElementById('locationDisplay');

async function loadLeaderboard() {
    try {
        const q = query(collection(db, "jumpking_leaderboard"), orderBy("time", "asc"), limit(5));
        const querySnapshot = await getDocs(q);
        lbList.innerHTML = '';
        if(querySnapshot.empty) {
            lbList.innerHTML = 'Zatím žádné časy.';
            return;
        }
        let i = 1;
        querySnapshot.forEach((doc) => {
            const data = doc.data();
            let min = Math.floor(data.time / 60000);
            let sec = ((data.time % 60000) / 1000).toFixed(2);
            lbList.innerHTML += `<div class="lb-entry"><span>${i}. ${data.name}</span><span>${min}:${sec < 10 ? '0' : ''}${sec}</span></div>`;
            i++;
        });
    } catch (e) {
        lbList.innerHTML = 'Chyba připojení k DB.';
        console.error(e);
    }
}

async function saveScore(name, timeMs) {
    try {
        await addDoc(collection(db, "jumpking_leaderboard"), {
            name: name,
            time: timeMs,
            timestamp: Date.now()
        });
        loadLeaderboard();
    } catch (e) {
        console.error("Error saving score: ", e);
    }
}

loadLeaderboard();

startBtn.addEventListener('click', () => {
    if(nameInput.value.trim() !== "") currentPlayerName = nameInput.value.trim();
    startScreen.style.display = 'none';
    uiScreen.style.display = 'block';
    gameState = 'PLAYING';
    startTime = Date.now();
    resetGame();
});

const gravity = 0.15; 
const horizontalFriction = 0.85;
const jumpChargeSpeed = 0.15; 
const maxJumpPower = 9.5; 

let audioCtx;
function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playSound(type) {
    if (!audioCtx || audioCtx.state === 'suspended') return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    
    const now = audioCtx.currentTime;
    if (type === 'jump') {
        osc.type = 'sine'; osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
        gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        osc.start(now); osc.stop(now + 0.1);
    } else if (type === 'bounce') {
        osc.type = 'triangle'; osc.frequency.setValueAtTime(200, now); osc.frequency.exponentialRampToValueAtTime(50, now + 0.1);
        gain.gain.setValueAtTime(0.4, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        osc.start(now); osc.stop(now + 0.1);
    } else if (type === 'land') {
        osc.type = 'square'; osc.frequency.setValueAtTime(100, now); osc.frequency.exponentialRampToValueAtTime(30, now + 0.1);
        gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        osc.start(now); osc.stop(now + 0.1);
    } else if (type === 'win') {
        osc.type = 'sine'; osc.frequency.setValueAtTime(400, now); osc.frequency.setValueAtTime(600, now + 0.2); osc.frequency.setValueAtTime(800, now + 0.4);
        gain.gain.setValueAtTime(0.5, now); gain.gain.linearRampToValueAtTime(0, now + 0.6);
        osc.start(now); osc.stop(now + 0.6);
    }
}

let particles = [];
function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x: x, y: y, vx: (Math.random() - 0.5) * 8, vy: (Math.random() - 0.5) * 8,
            life: 1, color: color
        });
    }
}

function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx; p.y += p.vy; p.life -= 0.04;
        if (p.life <= 0) particles.splice(i, 1);
    }
}

const player = {
    x: 380, y: 640, width: 24, height: 32,
    vx: 0, vy: 0,
    isGrounded: false, currentPlatform: null,
    jumpCharge: 0, isCharging: false, direction: 1,
    color: '#e74c3c'
};

const world = { cameraY: 0 };
const lover = { x: 380, y: -4180, w: 40, h: 40, color: '#ff0000' };

let platforms = [];
function initPlatforms() {
    platforms = [
        // 0: Bažiny
        { x: 0, y: 680, w: 800, h: 40, color: '#3d5229' },
        { x: 100, y: 550, w: 120, h: 15, color: '#4a6b2d' },
        { x: 400, y: 450, w: 100, h: 15, color: '#4a6b2d', isMoving: true, minX: 300, maxX: 600, speed: 1.5, dirX: 1 },
        { x: 200, y: 300, w: 100, h: 15, color: '#4a6b2d' },
        { x: 550, y: 180, w: 120, h: 15, color: '#4a6b2d' },
        { x: 150, y: 50, w: 120, h: 15, color: '#4a6b2d' },

        // -1: Stoky
        { x: 400, y: -80, w: 100, h: 15, color: '#2f4f4f' },
        { x: 100, y: -200, w: 100, h: 15, color: '#2f4f4f' },
        { x: 350, y: -330, w: 120, h: 15, color: '#2f4f4f', isMoving: true, minX: 100, maxX: 600, speed: 2, dirX: -1 },
        { x: 600, y: -450, w: 100, h: 15, color: '#2f4f4f' },
        { x: 250, y: -580, w: 100, h: 15, color: '#2f4f4f' },

        // -2: Les
        { x: 100, y: -700, w: 150, h: 15, color: '#2ecc71' },
        { x: 450, y: -820, w: 100, h: 15, color: '#2ecc71' },
        { x: 200, y: -950, w: 100, h: 15, color: '#2ecc71', isMoving: true, minX: 200, maxX: 500, speed: 1.8, dirX: 1 },
        { x: 550, y: -1080, w: 80, h: 15, color: '#2ecc71' },
        { x: 300, y: -1210, w: 100, h: 15, color: '#2ecc71' },
        { x: 100, y: -1340, w: 80, h: 15, color: '#2ecc71' },

        // -3: Pole
        { x: 350, y: -1450, w: 120, h: 15, color: '#f39c12' },
        { x: 150, y: -1580, w: 100, h: 15, color: '#f39c12', isMoving: true, minX: 100, maxX: 700, speed: 2.5, dirX: 1 },
        { x: 600, y: -1700, w: 100, h: 15, color: '#f39c12' },
        { x: 250, y: -1820, w: 80, h: 15, color: '#f39c12' },
        { x: 500, y: -1950, w: 80, h: 15, color: '#f39c12' },
        { x: 300, y: -2080, w: 100, h: 15, color: '#f39c12' },

        // -4: Vesnice
        { x: 100, y: -2180, w: 150, h: 15, color: '#d35400' },
        { x: 450, y: -2300, w: 100, h: 15, color: '#d35400' },
        { x: 200, y: -2420, w: 100, h: 15, color: '#d35400', isMoving: true, minX: 150, maxX: 550, speed: 2, dirX: -1 },
        { x: 600, y: -2550, w: 100, h: 15, color: '#d35400' },
        { x: 350, y: -2680, w: 80, h: 15, color: '#d35400' },

        // -5: Hrad
        { x: 200, y: -2780, w: 100, h: 15, color: '#95a5a6' },
        { x: 500, y: -2900, w: 80, h: 15, color: '#95a5a6' },
        { x: 300, y: -3030, w: 80, h: 15, color: '#95a5a6', isMoving: true, minX: 200, maxX: 600, speed: 3, dirX: 1 },
        { x: 100, y: -3160, w: 70, h: 15, color: '#95a5a6' },
        { x: 450, y: -3280, w: 70, h: 15, color: '#95a5a6' },
        { x: 350, y: -3400, w: 80, h: 15, color: '#95a5a6' },

        // -6: Věž
        { x: 250, y: -3520, w: 70, h: 15, color: '#34495e' },
        { x: 500, y: -3650, w: 60, h: 15, color: '#34495e', isMoving: true, minX: 200, maxX: 600, speed: 3.5, dirX: -1 },
        { x: 300, y: -3780, w: 50, h: 15, color: '#34495e' },
        { x: 450, y: -3900, w: 40, h: 15, color: '#34495e' },
        { x: 350, y: -4020, w: 50, h: 15, color: '#34495e' },
        { x: 350, y: -4140, w: 100, h: 20, color: '#f1c40f' } 
    ];
}

function resetGame() {
    player.x = 380; player.y = 640;
    player.vx = 0; player.vy = 0;
    player.jumpCharge = 0; player.isCharging = false; player.isGrounded = false;
    world.cameraY = 0;
    initPlatforms();
}

const keys = {};

window.addEventListener('keydown', e => {
    if(gameState !== 'PLAYING') return;
    initAudio();
    if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    
    keys[e.code] = true;
    if (e.code === 'Space' && player.isGrounded) {
        player.isCharging = true;
    }
});

window.addEventListener('keyup', e => {
    if(gameState !== 'PLAYING') return;
    keys[e.code] = false;
    if (e.code === 'Space' && player.isCharging) {
        player.vy = -player.jumpCharge;
        player.vx = player.direction * (player.jumpCharge * 0.45);
        if(player.currentPlatform && player.currentPlatform.isMoving) {
            player.vx += (player.currentPlatform.dirX * player.currentPlatform.speed) * 0.5;
        }
        player.jumpCharge = 0; player.isCharging = false; player.isGrounded = false; player.currentPlatform = null;
        playSound('jump');
        spawnParticles(player.x + 12, player.y + 32, '#fff', 15);
    }
});

function update() {
    if(gameState !== 'PLAYING') return;

    elapsedTime = Date.now() - startTime;
    updateParticles();

    platforms.forEach(p => {
        if (p.isMoving) {
            p.x += p.dirX * p.speed;
            if (p.x <= p.minX || p.x + p.w >= p.maxX) p.dirX *= -1;
        }
    });

    if (player.isGrounded && !player.isCharging) {
        if (keys['KeyA'] || keys['ArrowLeft']) { player.vx = -3; player.direction = -1; } 
        else if (keys['KeyD'] || keys['ArrowRight']) { player.vx = 3; player.direction = 1; } 
        else { player.vx = 0; }
        
        if(player.currentPlatform && player.currentPlatform.isMoving) {
            player.x += player.currentPlatform.dirX * player.currentPlatform.speed;
        }
    }

    if (player.isCharging) {
        player.jumpCharge = Math.min(player.jumpCharge + jumpChargeSpeed, maxJumpPower);
        player.vx = 0;
        if(player.currentPlatform && player.currentPlatform.isMoving) {
            player.x += player.currentPlatform.dirX * player.currentPlatform.speed;
        }
    }

    player.vy += gravity;
    player.x += player.vx;

    // Fyzika odrazu - ztráta výšky/hybnosti
    if (player.x < 0) {
        player.x = 0;
        player.vx = Math.max(Math.abs(player.vx) * 0.9, 3);
        player.vy *= 0.8; // Ztráta vertikální rychlosti
        playSound('bounce');
        spawnParticles(player.x, player.y + 16, '#ffcc00', 10);
    }
    if (player.x + player.width > canvas.width) {
        player.x = canvas.width - player.width;
        player.vx = -Math.max(Math.abs(player.vx) * 0.9, 3);
        player.vy *= 0.8; 
        playSound('bounce');
        spawnParticles(player.x + player.width, player.y + 16, '#ffcc00', 10);
    }

    player.y += player.vy;
    let wasGrounded = player.isGrounded;
    player.isGrounded = false;
    player.currentPlatform = null;

    platforms.forEach(p => {
        if (player.x + player.width > p.x && player.x < p.x + p.w &&
            player.y + player.height > p.y && player.y < p.y + p.h) {
            
            if (player.vy > 0 && player.y + player.height - player.vy <= p.y + 12) {
                player.y = p.y - player.height;
                player.vy = 0;
                player.vx *= horizontalFriction;
                player.isGrounded = true;
                player.currentPlatform = p;
                if (!wasGrounded) {
                    playSound('land');
                    spawnParticles(player.x + 12, player.y + 32, p.color, 12);
                }
            } else if (player.vy < 0 && player.y - player.vy >= p.y + p.h - 10) {
                player.y = p.y + p.h;
                player.vy *= -0.5; 
                playSound('bounce');
                spawnParticles(player.x + 12, player.y, '#fff', 8);
            }
        }
    });

    if (player.x < lover.x + lover.w && player.x + player.width > lover.x && 
        player.y < lover.y + lover.h && player.height + player.y > lover.y) {
        gameState = 'WON';
        playSound('win');
        spawnParticles(lover.x + 20, lover.y + 20, '#ff0000', 100);
        saveScore(currentPlayerName, elapsedTime);
        
        setTimeout(() => {
            startScreen.style.display = 'flex';
            uiScreen.style.display = 'none';
        }, 4000);
    }

    world.cameraY = Math.floor(player.y / canvas.height) * canvas.height;
}

function drawBackgrounds() {
    ctx.fillStyle = '#1e2712'; ctx.fillRect(0, 0, canvas.width, 700);
    ctx.fillStyle = '#1a2525'; ctx.fillRect(0, -700, canvas.width, 700);
    ctx.fillStyle = '#0f291e'; ctx.fillRect(0, -1400, canvas.width, 700);
    ctx.fillStyle = '#3a2e15'; ctx.fillRect(0, -2100, canvas.width, 700);
    ctx.fillStyle = '#2c1e16'; ctx.fillRect(0, -2800, canvas.width, 700);
    ctx.fillStyle = '#1a1c23'; ctx.fillRect(0, -3500, canvas.width, 700);
    ctx.fillStyle = '#0a0a0f'; ctx.fillRect(0, -4200, canvas.width, 700);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    if(gameState === 'START') return;

    ctx.save();
    ctx.translate(0, -world.cameraY);
    drawBackgrounds();

    ctx.fillStyle = lover.color;
    ctx.fillRect(lover.x, lover.y, lover.w, lover.h);
    ctx.fillStyle = '#fff';
    ctx.fillRect(lover.x + 10, lover.y + 10, 5, 5);
    ctx.fillRect(lover.x + 25, lover.y + 10, 5, 5);

    platforms.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.fillRect(p.x, p.y + p.h - 5, p.w, 5);
        if(p.isMoving) {
            ctx.fillStyle = 'rgba(255,255,255,0.2)';
            ctx.fillRect(p.x + 5, p.y + 2, p.w - 10, 2);
        }
    });

    particles.forEach(p => {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 4, 4);
    });
    ctx.globalAlpha = 1.0;

    ctx.fillStyle = player.color;
    if (player.isCharging) {
        let squash = (player.jumpCharge / maxJumpPower) * 12;
        ctx.fillRect(player.x, player.y + squash, player.width, player.height - squash);
    } else {
        ctx.fillRect(player.x, player.y, player.width, player.height);
    }

    ctx.fillStyle = 'white';
    let eyeOffset = player.direction === 1 ? 14 : 4;
    ctx.fillRect(player.x + eyeOffset, player.y + 6, 6, 6);
    ctx.fillStyle = 'black';
    ctx.fillRect(player.x + eyeOffset + (player.direction === 1 ? 2 : 0), player.y + 8, 4, 4);

    ctx.restore();

    let minutes = Math.floor(elapsedTime / 60000);
    let seconds = ((elapsedTime % 60000) / 1000).toFixed(2);
    timeDisplay.innerText = `Čas: ${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
    
    const locations = ["Bažiny", "Stoky", "Les", "Pole", "Vesnice", "Hrad", "Věž"];
    let currentScreenIndex = Math.abs(Math.floor(player.y / canvas.height));
    locationDisplay.innerText = locations[currentScreenIndex] || "V oblacích";

    if (gameState === 'WON') {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#f1c40f';
        ctx.font = 'bold 50px "Segoe UI"';
        ctx.textAlign = 'center';
        ctx.fillText('VYHRÁL JSI!', canvas.width / 2, canvas.height / 2 - 20);
        ctx.fillStyle = 'white';
        ctx.font = '30px "Segoe UI"';
        ctx.fillText(`Hráč: ${currentPlayerName}`, canvas.width / 2, canvas.height / 2 + 30);
        ctx.fillText(`Čas: ${minutes}:${seconds < 10 ? '0' : ''}${seconds}`, canvas.width / 2, canvas.height / 2 + 70);
    } else if (player.isCharging) {
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.fillRect(canvas.width/2 - 100, 650, 200, 10);
        ctx.fillStyle = '#f1c40f';
        ctx.fillRect(canvas.width/2 - 100, 650, (player.jumpCharge / maxJumpPower) * 200, 10);
    }
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

initPlatforms();
loop();
</script>
</body>
</html>
