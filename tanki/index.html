<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Tanková Bitva</title>
<style>
    body {
        margin: 0;
        background: #111;
        color: #fff;
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        height: 100vh;
        overflow: hidden;
    }
    #menu {
        background: #222;
        padding: 30px;
        border-radius: 10px;
        margin-top: 50px;
        display: flex;
        flex-direction: column;
        gap: 15px;
        box-shadow: 0 0 20px rgba(0,0,0,0.8);
    }
    h2 { margin-top: 0; text-align: center; color: #4CAF50; }
    .player-setup {
        display: flex;
        gap: 10px;
        align-items: center;
        background: #333;
        padding: 10px;
        border-radius: 5px;
    }
    .player-setup input[type="text"] {
        width: 60px;
        text-align: center;
        background: #444;
        color: #fff;
        border: 1px solid #555;
        padding: 5px;
    }
    .player-setup input[type="color"] {
        cursor: pointer;
    }
    #gameArea {
        display: none;
        position: relative;
        margin-top: 20px;
    }
    canvas {
        background: #3e4a2e;
        border: 4px solid #555;
        box-shadow: 0 0 15px #000;
    }
    #ui {
        position: absolute;
        top: 10px;
        left: 20px;
        right: 20px;
        display: flex;
        justify-content: space-between;
        pointer-events: none;
        font-weight: bold;
        font-size: 18px;
        text-shadow: 1px 1px 2px #000;
    }
    button {
        padding: 15px 30px;
        font-size: 20px;
        cursor: pointer;
        background: #4CAF50;
        color: white;
        border: none;
        border-radius: 5px;
        margin-top: 10px;
        font-weight: bold;
    }
    button:hover { background: #45a049; }
</style>
</head>
<body>

<div id="menu">
    <h2>Nastavení Tanků</h2>
    <div id="setup-container"></div>
    <button onclick="startGame()">Start Hry</button>
</div>

<div id="gameArea">
    <div id="ui">
        <span id="hp0"></span><span id="hp1"></span><span id="hp2"></span><span id="hp3"></span>
    </div>
    <canvas id="gameCanvas" width="900" height="700"></canvas>
</div>

<script src="../censor.js"></script>
<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const menu = document.getElementById('menu');
    const gameArea = document.getElementById('gameArea');

    let players = [];
    let bullets = [];
    let obstacles = [];
    let keys = {};
    let gameActive = false;

    // Výchozí klávesy (Pozn: Mezerník je zapsán jako " ")
    const defaultControls = [
        { up: 'w', down: 's', left: 'a', right: 'd', shoot: ' ' },
        { up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight', shoot: 'Enter' },
        { up: 'i', down: 'k', left: 'j', right: 'l', shoot: 'p' },
        { up: '8', down: '5', left: '4', right: '6', shoot: '0' }
    ];
    const defaultColors = ['#ff4444', '#4444ff', '#44ff44', '#ffff44'];

    const setupContainer = document.getElementById('setup-container');
    for(let i=0; i<4; i++) {
        setupContainer.innerHTML += `
            <div class="player-setup">
                <strong style="color:${defaultColors[i]}">Hráč ${i+1}</strong>
                <input type="color" id="p${i}color" value="${defaultColors[i]}">
                Vpřed: <input type="text" id="p${i}up" value="${defaultControls[i].up}">
                Vzad: <input type="text" id="p${i}down" value="${defaultControls[i].down}">
                Vlevo: <input type="text" id="p${i}left" value="${defaultControls[i].left}">
                Vpravo: <input type="text" id="p${i}right" value="${defaultControls[i].right}">
                Střelba: <input type="text" id="p${i}shoot" value="${defaultControls[i].shoot}">
            </div>
        `;
    }

    window.addEventListener('keydown', e => keys[e.key] = true);
    window.addEventListener('keyup', e => keys[e.key] = false);

    function rectIntersect(r1, r2) {
        return !(r2.x > r1.x + r1.w || r2.x + r2.w < r1.x || r2.y > r1.y + r1.h || r2.y + r2.h < r1.y);
    }

    function generateMap() {
        obstacles = [];
        // Okraje mapy
        obstacles.push({x: 0, y: 0, w: canvas.width, h: 10});
        obstacles.push({x: 0, y: canvas.height - 10, w: canvas.width, h: 10});
        obstacles.push({x: 0, y: 0, w: 10, h: canvas.height});
        obstacles.push({x: canvas.width - 10, y: 0, w: 10, h: canvas.height});

        // Náhodné budovy a zdi
        for(let i=0; i<20; i++) {
            let w = Math.random() * 100 + 30;
            let h = Math.random() * 100 + 30;
            let x = Math.random() * (canvas.width - w - 20) + 10;
            let y = Math.random() * (canvas.height - h - 20) + 10;
            
            // Ochrana spawnu hráčů v rozích
            let safeZone = 120;
            if (
                (x < safeZone && y < safeZone) || 
                (x > canvas.width - safeZone && y < safeZone) || 
                (x < safeZone && y > canvas.height - safeZone) || 
                (x > canvas.width - safeZone && y > canvas.height - safeZone)
            ) continue;

            obstacles.push({x, y, w, h});
        }
    }

    function startGame() {
        menu.style.display = 'none';
        gameArea.style.display = 'block';
        gameActive = true;

        players = [];
        bullets = [];
        keys = {};

        const spawns = [
            {x: 50, y: 50, angle: Math.PI/4},
            {x: canvas.width - 50, y: 50, angle: Math.PI - Math.PI/4},
            {x: 50, y: canvas.height - 50, angle: -Math.PI/4},
            {x: canvas.width - 50, y: canvas.height - 50, angle: Math.PI + Math.PI/4}
        ];

        for(let i=0; i<4; i++) {
            players.push({
                id: i,
                x: spawns[i].x,
                y: spawns[i].y,
                angle: spawns[i].angle,
                color: document.getElementById(`p${i}color`).value,
                controls: {
                    up: document.getElementById(`p${i}up`).value,
                    down: document.getElementById(`p${i}down`).value,
                    left: document.getElementById(`p${i}left`).value,
                    right: document.getElementById(`p${i}right`).value,
                    shoot: document.getElementById(`p${i}shoot`).value
                },
                hp: 100,
                cooldown: 0,
                alive: true,
                radius: 14,
                speed: 1
            });
        }

        generateMap();
        updateUI();
        requestAnimationFrame(gameLoop);
    }

    function updateUI() {
        for(let i=0; i<4; i++) {
            let el = document.getElementById(`hp${i}`);
            el.style.color = players[i].color;
            el.innerText = players[i].alive ? `Hráč ${i+1}: ${players[i].hp}HP` : `Hráč ${i+1}: KO`;
        }
    }

    function gameLoop() {
        if (!gameActive) return;

        let activePlayers = players.filter(p => p.alive).length;
        if (activePlayers <= 1) {
            gameActive = false;
            let winner = players.find(p => p.alive);
            ctx.fillStyle = "rgba(0,0,0,0.7)";
            ctx.fillRect(0,0, canvas.width, canvas.height);
            ctx.fillStyle = winner ? winner.color : "white";
            ctx.font = "50px Arial";
            ctx.textAlign = "center";
            ctx.fillText(winner ? `Hráč ${winner.id + 1} Vítězí!` : "Remíza!", canvas.width/2, canvas.height/2);
            
            setTimeout(() => {
                gameArea.style.display = 'none';
                menu.style.display = 'flex';
            }, 4000);
            return;
        }

        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    function update() {
        // Hráči
        players.forEach(p => {
            if(!p.alive) return;

            if(p.cooldown > 0) p.cooldown--;

            let moveDir = 0;
            if(keys[p.controls.up]) moveDir = 1;
            if(keys[p.controls.down]) moveDir = -1;
            if(keys[p.controls.left]) p.angle -= 0.06;
            if(keys[p.controls.right]) p.angle += 0.06;

            if (moveDir !== 0) {
                let nx = p.x + Math.cos(p.angle) * p.speed * moveDir;
                let ny = p.y + Math.sin(p.angle) * p.speed * moveDir;
                let pRect = {x: nx - p.radius, y: ny - p.radius, w: p.radius*2, h: p.radius*2};
                
                let collision = obstacles.some(obs => rectIntersect(pRect, obs));
                players.forEach(other => {
                    if(p.id !== other.id && other.alive) {
                        let dx = nx - other.x; let dy = ny - other.y;
                        if(Math.sqrt(dx*dx + dy*dy) < p.radius + other.radius) collision = true;
                    }
                });

                if(!collision) { p.x = nx; p.y = ny; }
            }

            if(keys[p.controls.shoot] && p.cooldown === 0) {
                bullets.push({
                    x: p.x + Math.cos(p.angle) * (p.radius + 10),
                    y: p.y + Math.sin(p.angle) * (p.radius + 10),
                    vx: Math.cos(p.angle) * 8,
                    vy: Math.sin(p.angle) * 8,
                    owner: p.id,
                    life: 120
                });
                p.cooldown = 40;
            }
        });

        // Střely
        for(let i = bullets.length - 1; i >= 0; i--) {
            let b = bullets[i];
            b.x += b.vx;
            b.y += b.vy;
            b.life--;

            let hitObs = obstacles.some(obs => rectIntersect({x: b.x-3, y: b.y-3, w: 6, h: 6}, obs));
            let hitPlayer = false;

            players.forEach(p => {
                if(p.alive && b.owner !== p.id) {
                    let dx = b.x - p.x; let dy = b.y - p.y;
                    if(Math.sqrt(dx*dx + dy*dy) < p.radius + 4) {
                        hitPlayer = true;
                        p.hp -= 25;
                        if(p.hp <= 0) p.alive = false;
                        updateUI();
                    }
                }
            });

            if(b.life <= 0 || hitObs || hitPlayer) bullets.splice(i, 1);
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Překážky
        ctx.fillStyle = "#6b705c";
        ctx.strokeStyle = "#000";
        ctx.lineWidth = 2;
        obstacles.forEach(obs => {
            ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
            ctx.strokeRect(obs.x, obs.y, obs.w, obs.h);
        });

        // Zničení hráči (vraky)
        players.forEach(p => {
            if(p.alive) return;
            ctx.fillStyle = "#222";
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            ctx.fill();
        });

        // Živí hráči
        players.forEach(p => {
            if(!p.alive) return;
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.angle);
            
            // Tělo tanku
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(0, 0, p.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            // Hlaveň
            ctx.fillStyle = "#111";
            ctx.fillRect(0, -4, p.radius + 10, 8);
            ctx.restore();
            
            // Indikátor HP nad tankem
            ctx.fillStyle = "white";
            ctx.fillRect(p.x - 15, p.y - 25, 30, 4);
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x - 15, p.y - 25, 30 * (p.hp/100), 4);
        });

        // Střely
        ctx.fillStyle = "#ffdd00";
        ctx.strokeStyle = "#ff0000";
        bullets.forEach(b => {
            ctx.beginPath();
            ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
        });
    }
</script>
</body>
</html>
