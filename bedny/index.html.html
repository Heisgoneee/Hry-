<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>CS:GO Simulator - Start From Zero</title>
    <style>
        body {
            background-color: #121212;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 1100px;
            background: #1e1e1e;
            padding: 15px 30px;
            border-radius: 8px;
            box-sizing: border-box;
            border-bottom: 3px solid #5cb85c;
            margin-bottom: 20px;
        }

        .balance-display {
            font-size: 24px;
            font-weight: bold;
            color: #5cb85c;
        }

        .container {
            text-align: center;
            width: 1100px;
        }

        .case-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .case-card {
            background: #2a2a2a;
            border: 2px solid #444;
            border-radius: 8px;
            padding: 15px;
            width: 190px;
            cursor: pointer;
            transition: 0.2s;
        }

        .case-card:hover { border-color: #5cb85c; background: #333; }
        .case-card.active { border-color: #5cb85c; background: #223322; box-shadow: 0 0 15px rgba(92, 184, 92, 0.3); }
        .case-name { font-weight: bold; font-size: 16px; margin-bottom: 10px; }
        .case-price { color: #ffd700; font-size: 14px; }
        .case-knife-chance { font-size: 12px; color: #caab05; margin-top: 8px; font-weight: bold; text-shadow: 0 0 5px rgba(202, 171, 5, 0.3); }

        .case-viewport {
            width: 100%;
            height: 220px; 
            border: 2px solid #444;
            position: relative;
            overflow: hidden;
            background: #1a1a1b;
            margin-bottom: 20px;
            border-radius: 5px;
            box-shadow: inset 0 0 20px #000;
        }

        .selector {
            position: absolute;
            left: 50%;
            top: 0;
            width: 4px;
            height: 100%;
            background: #ff0000;
            z-index: 10;
            transform: translateX(-50%);
            box-shadow: 0 0 15px rgba(255,0,0,1);
        }

        .items-strip {
            display: flex;
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            will-change: transform;
        }

        .item {
            min-width: 200px; 
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 2px solid #111;
            flex-direction: column;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            padding: 10px;
            box-sizing: border-box;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        .skin-img {
            width: 140px;
            height: 100px;
            object-fit: contain;
            margin-bottom: 10px;
            filter: drop-shadow(0px 5px 5px rgba(0,0,0,0.7));
            background: rgba(0,0,0,0.2);
            border-radius: 4px;
        }

        .item-name {
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 3px;
        }

        .item-exterior {
            font-size: 11px;
            color: #aaa;
            margin-bottom: 5px;
        }

        .blue { background: radial-gradient(circle, #2b3a8c 0%, #111 100%); border-bottom: 4px solid #4b69ff;}
        .purple { background: radial-gradient(circle, #4d2891 0%, #111 100%); border-bottom: 4px solid #8847ff;}
        .pink { background: radial-gradient(circle, #7a1885 0%, #111 100%); border-bottom: 4px solid #d32ce6;}
        .red { background: radial-gradient(circle, #8a2a2a 0%, #111 100%); border-bottom: 4px solid #eb4b4b;}
        .gold { background: radial-gradient(circle, #7a6703 0%, #111 100%); border-bottom: 4px solid #caab05;}

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        button {
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            background: #5cb85c;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.2s;
            text-transform: uppercase;
        }

        button:hover:not(:disabled) { background: #4cae4c; transform: scale(1.02); }
        button:disabled { background: #444; cursor: not-allowed; color: #888; }
        
        #result { font-size: 22px; font-weight: bold; min-height: 30px; text-shadow: 0 0 5px rgba(255,255,255,0.2); }
        
        .inventory-section {
            width: 1100px;
            margin-top: 30px;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #2a2a2a;
            padding: 15px 20px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 16px;
        }

        .sell-all-btn {
            padding: 8px 15px;
            font-size: 14px;
            background: #d9534f;
            margin-left: 15px;
            text-transform: none;
        }

        .sell-all-btn:hover { background: #c9302c; }

        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            max-height: 600px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .inv-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 230px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            padding: 10px;
            box-sizing: border-box;
            background: #222;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .inv-item .price-tag { color: #ffd700; font-size: 14px; margin-top: 5px; margin-bottom: 8px;}
        
        .inv-actions {
            display: flex;
            width: 100%;
            gap: 5px;
            margin-top: auto;
        }

        .sell-btn {
            background: #d9534f;
            color: white;
            border: none;
            padding: 8px 10px;
            font-size: 12px;
            border-radius: 3px;
            cursor: pointer;
            flex: 1;
            text-transform: none;
        }
        .sell-btn:hover:not(:disabled) { background: #c9302c; }
        .sell-btn:disabled { background: #555; cursor: not-allowed; }

        .lock-btn {
            background: #444;
            color: white;
            border: none;
            padding: 8px;
            font-size: 12px;
            border-radius: 3px;
            cursor: pointer;
            width: 35px;
            text-transform: none;
        }
        .lock-btn:hover { background: #555; }
        .lock-btn.locked { background: #f0ad4e; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

    </style>
</head>
<body>

<div class="header">
    <h2>CS:GO Simulator</h2>
    <div>Zůstatek: <span id="balanceDisplay" class="balance-display">$0.00</span></div>
</div>

<div class="container">
    <div class="case-selector" id="caseSelector"></div>

    <div class="case-viewport">
        <div class="selector"></div>
        <div id="strip" class="items-strip"></div>
    </div>
    
    <div class="controls">
        <button id="openBtn" onclick="spin()"></button>
    </div>
    <div id="result">Vyber si bednu a zkus štěstí!</div>
</div>

<div class="inventory-section">
    <div class="stats">
        <div>Inventář: <span id="itemCount">0</span> ks <button class="sell-all-btn" onclick="sellAllUnlocked()">💰 Prodat vše odemčené</button></div>
        <div>Utraceno: <span id="totalSpent" style="color: #eb4b4b;">$0.00</span></div>
        <div>Hodnota skinů: <span id="totalValue" style="color: #5cb85c;">$0.00</span></div>
    </div>
    <div class="inventory-grid" id="inventory"></div>
</div>

<script>
    let userBalance = 0.00;
    let inventory = [];
    let totalSpent = 0;
    let currentCaseIndex = 0;
    let isSpinning = false;

    const weapons = [
        "AK-47", "M4A4", "M4A1-S", "AWP", "Glock-18", "USP-S", "Desert Eagle", 
        "MAC-10", "MP7", "P90", "FAMAS", "Galil AR", "SG 553", "SSG 08", "Nova", 
        "Negev", "P250", "Five-SeveN", "CZ75-Auto", "Tec-9", "UMP-45", "MP9",
        "XM1014", "MAG-7", "Sawed-Off", "Dual Berettas", "G3SG1", "SCAR-20", "PP-Bizon"
    ];
    
    const knives = [
        "★ Karambit", "★ Butterfly Knife", "★ M9 Bayonet", "★ Talon Knife", 
        "★ Skeleton Knife", "★ Bayonet", "★ Huntsman Knife", "★ Flip Knife", 
        "★ Shadow Daggers", "★ Bowie Knife", "★ Navaja Knife", "★ Stiletto Knife", 
        "★ Ursus Knife", "★ Paracord Knife", "★ Survival Knife", "★ Nomad Knife"
    ];
    
    const finishes = {
        blue: ["Sand Dune", "Safari Mesh", "Boreal Forest", "Scorched", "Urban DDPAT", "Night Ops", "Tornado", "Mudder", "Polar Camo", "Contractor", "Army Mesh", "Facility Sketch", "Mainframe", "Capillary", "Oxide Blaze", "Army Sheen", "Groundwater", "Colony", "Sand Scale"],
        purple: ["Candy Apple", "Fade", "Night", "Ultraviolet", "Blizzard Marbleized", "Copper Galaxy", "Acid Fade", "Nitro", "Dark Water", "Bright Water", "Evil Daimyo", "Phobos", "Worm God", "Elite Build", "Zirka", "Metallic DDPAT", "Jungle Slipstream", "Crimson Blossom", "Macabre", "Valence", "Supernova"],
        pink: ["Redline", "Printstream", "Neo-Noir", "Hyper Beast", "Bloodsport", "Mecha Industries", "Cyrex", "Asiimov", "Vulcan", "Water Elemental", "Decimator", "Empress", "Fever Dream", "Desolate Space", "Frontside Misty", "Neon Rider", "Chantico's Fire", "Nightwish", "Wasteland Rebel", "Aquamarine Revenge"],
        red: ["Dragon Lore", "Howl", "Medusa", "Gungnir", "Wild Lotus", "Fire Serpent", "Poseidon", "Atheris", "Emperor", "Kill Confirmed", "Oni Taiji", "The Traitor", "Head Shot", "Temukau", "Eye of Athena", "Golden Coil", "Player Two", "Neon Revolution", "Infiltrator", "Bloodsport"],
        gold: ["Doppler", "Marble Fade", "Tiger Tooth", "Crimson Web", "Lore", "Case Hardened", "Fade", "Slaughter", "Blue Steel", "Vanilla", "Gamma Doppler", "Autotronic", "Freehand", "Black Laminate", "Rust Coat", "Night", "Ultraviolet", "Boreal Forest", "Forest DDPAT", "Safari Mesh"]
    };

    const exteriors = [
        { name: "Factory New", abbrev: "FN", minFloat: 0.00, maxFloat: 0.07, priceMult: 1.5 },
        { name: "Minimal Wear", abbrev: "MW", minFloat: 0.07, maxFloat: 0.15, priceMult: 1.2 },
        { name: "Field-Tested", abbrev: "FT", minFloat: 0.15, maxFloat: 0.38, priceMult: 1.0 },
        { name: "Well-Worn", abbrev: "WW", minFloat: 0.38, maxFloat: 0.45, priceMult: 0.8 },
        { name: "Battle-Scarred", abbrev: "BS", minFloat: 0.45, maxFloat: 1.00, priceMult: 0.6 }
    ];

    function getRandomExterior() {
        const rand = Math.random();
        if (rand < 0.10) return exteriors[0];
        if (rand < 0.25) return exteriors[1];
        if (rand < 0.65) return exteriors[2];
        if (rand < 0.85) return exteriors[3];
        return exteriors[4];
    }

    function generateItems(count, weightProfile, priceMultipliers) {
        let generated = [];
        const rarities = ['blue', 'purple', 'pink', 'red', 'gold'];
        for(let i=0; i<count; i++) {
            let randRarity = rarities[Math.floor(Math.random() * rarities.length)];
            let wps = (randRarity === 'gold') ? knives : weapons;
            let wp = wps[Math.floor(Math.random() * wps.length)];
            let fin = finishes[randRarity][Math.floor(Math.random() * finishes[randRarity].length)];
            
            let basePrice = priceMultipliers[randRarity] * (0.8 + Math.random() * 0.4);
            if(randRarity === 'gold') basePrice *= 5; 
            
            let fullName = `${wp} | ${fin}`;
            let colorHex = {'blue':'4b69ff','purple':'8847ff','pink':'d32ce6','red':'eb4b4b','gold':'caab05'}[randRarity];
            
            let safeNameForUrl = encodeURIComponent(wp + '\n' + fin);
            let imgUrl = `https://placehold.co/140x100/${colorHex}/FFF.png?text=${safeNameForUrl}&font=Montserrat`;

            generated.push({
                name: fullName,
                color: randRarity,
                weight: weightProfile[randRarity],
                basePrice: parseFloat(basePrice.toFixed(2)),
                image: imgUrl
            });
        }
        return generated;
    }

    const cases = [
        {
            name: "Free Case",
            price: 0.00,
            knifeChance: 0.1,
            items: generateItems(100, {blue: 85, purple: 12, pink: 2.8, red: 0.1, gold: 0.1}, {blue: 0.10, purple: 0.8, pink: 4, red: 15, gold: 50})
        },
        {
            name: "Mil-Spec Case",
            price: 2.50,
            knifeChance: 0.5,
            items: generateItems(120, {blue: 75, purple: 18, pink: 5, red: 1.5, gold: 0.5}, {blue: 0.2, purple: 2, pink: 8, red: 35, gold: 180})
        },
        {
            name: "Covert Case",
            price: 15.00,
            knifeChance: 2.0,
            items: generateItems(120, {blue: 30, purple: 40, pink: 20, red: 8, gold: 2}, {blue: 1.5, purple: 6, pink: 20, red: 150, gold: 800})
        },
        {
            name: "High Roller",
            price: 50.00,
            knifeChance: 5.0,
            items: generateItems(150, {blue: 0, purple: 20, pink: 50, red: 25, gold: 5}, {blue: 0, purple: 12, pink: 60, red: 300, gold: 1500})
        },
        {
            name: "Chroma Case",
            price: 5.00,
            knifeChance: 0.5,
            items: generateItems(120, {blue: 70, purple: 20, pink: 8, red: 1.5, gold: 0.5}, {blue: 0.5, purple: 3, pink: 15, red: 50, gold: 200})
        },
        {
            name: "Gamma Case",
            price: 8.00,
            knifeChance: 1.0,
            items: generateItems(120, {blue: 60, purple: 25, pink: 10, red: 4, gold: 1}, {blue: 0.8, purple: 4, pink: 18, red: 60, gold: 250})
        },
        {
            name: "Legendary Case",
            price: 100.00,
            knifeChance: 20.0,
            items: generateItems(150, {blue: 0, purple: 0, pink: 40, red: 40, gold: 20}, {blue: 0, purple: 0, pink: 100, red: 500, gold: 2500})
        }
    ];

    const strip = document.getElementById('strip');
    const inventoryContainer = document.getElementById('inventory');
    const balanceDisplay = document.getElementById('balanceDisplay');
    const openBtn = document.getElementById('openBtn');

    function saveGame() {
        const saveState = {
            balance: userBalance,
            spent: totalSpent,
            inv: inventory
        };
        localStorage.setItem('csgoSimSaveData', JSON.stringify(saveState));
    }

    function loadGame() {
        const saved = localStorage.getItem('csgoSimSaveData');
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                userBalance = parsed.balance || 0;
                totalSpent = parsed.spent || 0;
                inventory = parsed.inv || [];
                
                inventoryContainer.innerHTML = '';
                [...inventory].reverse().forEach(item => {
                    renderInventoryItem(item, true);
                });
                updateStats();
            } catch (e) {
                console.error("Chyba při načítání uložené hry:", e);
            }
        }
    }

    function renderCases() {
        const selector = document.getElementById('caseSelector');
        selector.innerHTML = '';
        cases.forEach((c, index) => {
            const div = document.createElement('div');
            div.className = `case-card ${index === currentCaseIndex ? 'active' : ''}`;
            div.onclick = () => selectCase(index);
            div.innerHTML = `
                <div class="case-name">${c.name}</div>
                <div class="case-price">${c.price === 0 ? 'ZDARMA' : '$' + c.price.toFixed(2)}</div>
                <div class="case-knife-chance">★ Nůž: ${c.knifeChance}%</div>
            `;
            selector.appendChild(div);
        });
        updateOpenButton();
        initStrip();
    }

    function selectCase(index) {
        if(isSpinning) return;
        currentCaseIndex = index;
        renderCases();
    }

    function updateOpenButton() {
        const c = cases[currentCaseIndex];
        openBtn.innerText = `OTEVŘÍT ${c.name} (${c.price === 0 ? 'ZDARMA' : '$' + c.price.toFixed(2)})`;
    }

    function updateStats() {
        const totalVal = inventory.reduce((sum, item) => sum + item.finalPrice, 0);
        document.getElementById('itemCount').innerText = inventory.length;
        document.getElementById('totalSpent').innerText = `$${totalSpent.toFixed(2)}`;
        document.getElementById('totalValue').innerText = `$${totalVal.toFixed(2)}`;
        balanceDisplay.innerText = `$${userBalance.toFixed(2)}`;
    }

    function getRandomItem(caseData) {
        let rand = Math.random() * 100;
        let sum = 0;
        for (let item of caseData.items) {
            sum += item.weight;
            if (rand <= sum) return item;
        }
        return caseData.items[0];
    }

    function initStrip() {
        strip.innerHTML = '';
        strip.style.transition = 'none';
        strip.style.transform = 'translateX(0px)';
        const currentCase = cases[currentCaseIndex];
        
        for (let i = 0; i < 70; i++) {
            const itemData = getRandomItem(currentCase);
            const div = document.createElement('div');
            div.className = `item ${itemData.color}`;
            div.innerHTML = `
                <img src="${itemData.image}" alt="skin" class="skin-img">
                <div class="item-name">${itemData.name}</div>
                <div style="color:#ffd700; font-size:14px; margin-top:5px;">$${itemData.basePrice.toFixed(2)}</div>
            `;
            strip.appendChild(div);
        }
    }

    function toggleLock(id, btnElement) {
        if(isSpinning) return;
        const item = inventory.find(i => i.id === id);
        if (item) {
            item.locked = !item.locked;
            btnElement.innerText = item.locked ? '🔒' : '🔓';
            btnElement.classList.toggle('locked', item.locked);
            const sellBtn = btnElement.nextElementSibling;
            sellBtn.disabled = item.locked;
            saveGame();
        }
    }

    function sellItem(id, price, element) {
        if(isSpinning) return;
        const index = inventory.findIndex(item => item.id === id);
        if (index > -1 && !inventory[index].locked) {
            inventory.splice(index, 1);
            userBalance += price;
            element.remove();
            updateStats();
            saveGame();
        }
    }

    function sellAllUnlocked() {
        if(isSpinning) return;
        
        let moneyEarned = 0;
        const itemsToSell = inventory.filter(item => !item.locked);
        
        if (itemsToSell.length === 0) return;

        itemsToSell.forEach(item => {
            moneyEarned += item.finalPrice;
            const domElement = document.getElementById(`inv-item-${item.id}`);
            if (domElement) domElement.remove();
        });

        inventory = inventory.filter(item => item.locked);
        userBalance += moneyEarned;
        updateStats();
        saveGame();
    }

    function renderInventoryItem(itemData, append = false) {
        const invDiv = document.createElement('div');
        invDiv.id = `inv-item-${itemData.id}`;
        invDiv.className = `inv-item ${itemData.color}`;
        
        invDiv.innerHTML = `
            <img src="${itemData.image}" alt="skin" class="skin-img">
            <span>${itemData.name}</span>
            <div class="item-exterior">${itemData.exterior.name}</div>
            <div class="price-tag">$${itemData.finalPrice.toFixed(2)}</div>
            <div class="inv-actions">
                <button class="lock-btn ${itemData.locked ? 'locked' : ''}" onclick="toggleLock(${itemData.id}, this)">${itemData.locked ? '🔒' : '🔓'}</button>
                <button class="sell-btn" onclick="sellItem(${itemData.id}, ${itemData.finalPrice}, this.parentElement.parentElement)" ${itemData.locked ? 'disabled' : ''}>Prodat +$${itemData.finalPrice.toFixed(2)}</button>
            </div>
        `;
        
        if (append) {
            inventoryContainer.appendChild(invDiv);
        } else {
            inventoryContainer.insertBefore(invDiv, inventoryContainer.firstChild);
        }
    }

    function addToInventory(itemData) {
        const exterior = getRandomExterior();
        const finalPrice = parseFloat((itemData.basePrice * exterior.priceMult).toFixed(2));
        
        const uniqueId = Date.now() + Math.random();
        const itemWithId = { ...itemData, id: uniqueId, exterior: exterior, finalPrice: finalPrice, locked: false };
        inventory.push(itemWithId);
        
        renderInventoryItem(itemWithId, false);
        updateStats();
        saveGame();
        
        return itemWithId;
    }

    function spin() {
        const currentCase = cases[currentCaseIndex];
        if(userBalance < currentCase.price) {
            alert('Nedostatek peněz! Otevři Free Case nebo prodej nějaké skiny z inventáře.');
            return;
        }

        isSpinning = true;
        openBtn.disabled = true;
        userBalance -= currentCase.price;
        totalSpent += currentCase.price;
        updateStats();
        saveGame();
        
        document.getElementById('result').innerText = "Otevírám...";
        
        initStrip();

        setTimeout(() => {
            const itemWidth = 200; 
            const winningIndex = 60;
            const offset = (winningIndex * itemWidth) - (550 - (itemWidth / 2)) + (Math.random() * 160 - 80);
            
            strip.style.transition = 'transform 6s cubic-bezier(0.05, 0.85, 0.1, 1)';
            strip.style.transform = `translateX(-${offset}px)`;

            setTimeout(() => {
                const winningItemDom = Array.from(strip.children)[winningIndex];
                const itemName = winningItemDom.querySelector('.item-name').innerText;
                const itemData = currentCase.items.find(i => i.name === itemName);
                
                const finalWonItem = addToInventory(itemData);
                
                const colorHex = {'blue':'#4b69ff','purple':'#8847ff','pink':'#d32ce6','red':'#eb4b4b','gold':'#caab05'}[finalWonItem.color];
                document.getElementById('result').innerHTML = `Padlo: <span style="color: ${colorHex}">${finalWonItem.name} (${finalWonItem.exterior.abbrev})</span> ($${finalWonItem.finalPrice.toFixed(2)})`;
                
                isSpinning = false;
                openBtn.disabled = false;
            }, 6200);
        }, 50);
    }

    renderCases();
    loadGame();
    updateStats();
</script>

</body>
</html>
